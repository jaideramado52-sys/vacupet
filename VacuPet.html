function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

async function ensureSupabase(){
  if(supa) return supa;
  if(!cloudConfigured()) return null;
  try{
    if(!window.supabase) await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js');
    if(!window.supabase) return null;
    supa = window.supabase.createClient(SB.url, SB.anonKey, {
      // detectSessionInUrl: procesa el enlace mágico (#access_token=…) al volver del correo.
      auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true, flowType:'implicit' }
    });
    const { data:{ session:s } } = await supa.auth.getSession();
    session = s || null;
    if(session) rcLogin();   // sesión ya guardada: vincula RevenueCat al arrancar
    supa.auth.onAuthStateChange((evt, s2)=>{
      session = s2;
      if(evt==='SIGNED_IN'){ closeModal(); if(window.Notification && Notification.permission==='granted') trySubscribePush(); pullState().then(()=>render()); pullEntitlement(); rcLogin(); }
      else if(evt==='SIGNED_OUT'){ rcLogout(); if(!shared) render(); }
      else if(!shared) render();
    });
    return supa;
  }catch(e){ console.warn('supabase init:', e); return null; }
}

// Decide si adoptar el estado remoto (puro, testeable).
function shouldAdoptRemote(remoteUpdatedAt, localUpdatedAt, remoteData){
  if(!remoteData || !Array.isArray(remoteData.pets)) return false;
  const r = remoteUpdatedAt ? Date.parse(remoteUpdatedAt) : 0;
  const l = localUpdatedAt ? Date.parse(localUpdatedAt) : 0;
  return r > l;
}

async function pullState(){
  const c = await ensureSupabase(); if(!c || !session) return;
  try{
    const { data:row, error } = await c.from('vacupet_state').select('data,updated_at').eq('user_id', session.user.id).maybeSingle();
    if(error){ console.warn(error); setSync(offlineNow()?'offline':'err'); return; }
    if(!row){ await pushState(true); return; }                 // no hay remoto: sube el local
    if(shouldAdoptRemote(row.updated_at, data.updatedAt, row.data)){
      data = migrate(row.data); data.updatedAt = row.updated_at;
      if(!data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
      save(false);                                             // persiste sin re-empujar
      render(); toast(t('sync_pulled'));
    } else {
      await pushState(true);                                   // local más nuevo o igual: sube
    }
  }catch(e){ console.warn('pull:', e); setSync(offlineNow()?'offline':'err'); }
}

async function pushState(silent){
  const c = await ensureSupabase(); if(!c || !session) return;
  setSync('syncing');
  try{
    const ts = data.updatedAt || new Date().toISOString(); data.updatedAt = ts;
    const { error } = await c.from('vacupet_state').upsert({ user_id:session.user.id, data, updated_at:ts });
    // Un fallo NO puede quedar como 'ok': el punto se pondría verde ("Sincronizado")
    // mientras los datos solo están en local. El sync automático es silent → el punto
    // rojo es el ÚNICO aviso que recibe el usuario.
    if(error){ console.warn(error); setSync(offlineNow()?'offline':'err'); if(!silent) toast(t('sync_err'),'error'); }
    else { setSync('ok'); if(!silent) toast(t('sync_done')); }
  }catch(e){ console.warn('push:', e); setSync(offlineNow()?'offline':'err'); if(!silent) toast(t('sync_err'),'error'); }
}
function scheduleSync(){ if(!session) return; clearTimeout(syncT); syncT=setTimeout(()=>pushState(true), 1500); }

/* ---- Storage (fotos/documentos en el bucket "mascotas") ---- */
async function sbUploadDataUrl(dataUrl, path, contentType){
  const c = await ensureSupabase(); if(!c || !session) return null;
  try{
    const blob = await (await fetch(dataUrl)).blob();
    const { error } = await c.storage.from('mascotas').upload(path, blob, { contentType: contentType||blob.type||'application/octet-stream', upsert:true });
    if(error){ console.warn('upload:', error); return null; }
    return path;
  }catch(e){ console.warn('upload:', e); return null; }
}
const _signed = {}; // cache ruta -> { url, exp }
async function sbSignedUrl(path){
  if(_signed[path] && _signed[path].exp > Date.now()) return _signed[path].url;
  const c = await ensureSupabase(); if(!c) return null;
  try{
    const { data, error } = await c.storage.from('mascotas').createSignedUrl(path, 3600);
    if(error || !data) return null;
    _signed[path] = { url:data.signedUrl, exp: Date.now()+3300000 };
    return data.signedUrl;
  }catch(e){ console.warn('signed url:', e); return null; }
}
async function sbRemove(path){ const c=await ensureSupabase(); if(!c||!session||!path) return; try{ await c.storage.from('mascotas').remove([path]); }catch(e){ console.warn('remove:', e); } }
// Rellena las imágenes con ruta de Storage tras renderizar (URL firmada).
async function hydrateStorage(){
  const els = document.querySelectorAll('img[data-storage]');
  for(const el of els){ const p=el.getAttribute('data-storage'); if(!p || el.dataset.done) continue; const url=await sbSignedUrl(p); if(url){ el.src=url; el.dataset.done='1'; } }
}

function missingVaccines(pet){
  const have = new Set((pet.vaccines||[]).map(v=>(v.nombre||'').trim().toLowerCase()));
  // Solo el esquema real (no las sugerencias comerciales, que son duplicados).
  return Object.keys(SCHEME[pet.info.especie]||SCHEME.otro).filter(n=>!have.has(n.toLowerCase()));
}
function aWhatsMissing(){
  const pet=activePet(); if(!pet) return t('a_none_pet');
  const s=petSummary(pet); const miss=missingVaccines(pet);
  if(s.estado==='aldia' && !miss.length) return tf('a_uptodate',{nombre:pet.info.nombre});
  const parts=[ tf('a_status',{venc:s.vencidas, prox:s.proximas}) ];
  parts.push(miss.length ? tf('a_missing_intro',{especie:cap(pet.info.especie), lista:miss.join(', ')}) : t('a_nomissing'));
  return parts.join('\n');
}
function aNextDose(){
  const pet=activePet(); if(!pet) return t('a_none_pet');
  const s=petSummary(pet); if(!s.next) return t('a_next_none');
  const cuando = s.next.fecha<todayISO()
    ? tf('overdue_ago',{n:Math.abs(daysBetween(s.next.fecha,todayISO()))})
    : tf('in_days',{n:daysBetween(todayISO(),s.next.fecha)});
  return tf('a_next',{nombre:s.next.nombre, fecha:fmt(s.next.fecha), cuando});

function aNextDeworm(){

function classify(text){
  const s=(text||'').toLowerCase(); const has=(...a)=>a.some(w=>s.includes(w));

    (p.vaccines||[]).forEach(v=>{ if(normStr(v.nombre).includes(nq)) push(p,'vacuna',v.nombre,v.fecha); });
    (p.meds||[]).forEach(m=>{ if(normStr(m.nombre).includes(nq)) push(p,'medicacion',m.nombre); });
    (p.dewormings||[]).forEach(d=>{ const n=d.producto||''; if(normStr(n).includes(nq)) push(p,'desparasitacion',n||'—',d.fecha); });
    (p.vetVisits||[]).forEach(v=>{ if(normStr(v.motivo||'').includes(nq)||normStr(v.diagnostico||'').includes(nq)) push(p,'visita',v.motivo||'—',v.fecha); });
    (p.cares||[]).forEach(c=>{ if(normStr(c.titulo||'').includes(nq)) push(p,'cuidado',c.titulo); });
  });
  return out.slice(0,40);
}

/* ======================================================================
   Privacidad y seguridad: PIN, biometría, respaldo cifrado, borrado
   ====================================================================== */
let locked = false;

// --- Criptografía base (WebCrypto) ---
function randBytes(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return a; }
function bytesToB64(bytes){ let s=''; for(let i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]); return btoa(s); }
function b64ToBytes(str){ const bin=atob(str); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }
async function pbkdf2Bits(pass, salt, it, len){
  const km=await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveBits']);
  return new Uint8Array(await crypto.subtle.deriveBits({ name:'PBKDF2', salt, iterations:it, hash:'SHA-256' }, km, len));
}
async function deriveAesKey(pass, salt, it){
  const km=await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:it, hash:'SHA-256' }, km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
const KDF_IT = 150000;

// --- PIN ---
async function hashPin(pin, saltBytes, it){ return bytesToB64(await pbkdf2Bits(pin, saltBytes, it||KDF_IT, 256)); }
async function setPin(pin){
  const salt=randBytes(16);
  const hash=await hashPin(pin, salt, KDF_IT);
  data.lock = Object.assign({}, data.lock, { enabled:true, salt:bytesToB64(salt), hash, it:KDF_IT });
  save();
}
async function checkPin(pin){
  const l=data.lock; if(!l||!l.enabled) return false;
  const h=await hashPin(pin, b64ToBytes(l.salt), l.it||KDF_IT);
  // comparación de longitud constante razonable
  if(h.length!==l.hash.length) return false;
  let diff=0; for(let i=0;i<h.length;i++) diff|=h.charCodeAt(i)^l.hash.charCodeAt(i);
  return diff===0;
}
function disableLock(){ if(data.lock){ delete data.lock; save(); } }

// --- Respaldo cifrado (AES-GCM + PBKDF2) ---
async function encryptBackup(pass){
  const salt=randBytes(16), iv=randBytes(12);
  const key=await deriveAesKey(pass, salt, KDF_IT);
  const pt=new TextEncoder().encode(JSON.stringify(data));
  const ct=new Uint8Array(await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, pt));
  return JSON.stringify({ app:'vacupet', enc:'AES-GCM', kdf:'PBKDF2-SHA256', it:KDF_IT, salt:bytesToB64(salt), iv:bytesToB64(iv), ct:bytesToB64(ct) });
}
async function decryptBackup(envStr, pass){
  const env=JSON.parse(envStr);
  if(env.app!=='vacupet' || !env.ct) throw new Error('bad');
  const key=await deriveAesKey(pass, b64ToBytes(env.salt), env.it||KDF_IT);
  const pt=await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBytes(env.iv) }, key, b64ToBytes(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

// --- Biometría (WebAuthn, gate local best-effort) ---
function bioSupported(){ return typeof window.PublicKeyCredential !== 'undefined' && !!(navigator.credentials); }
async function bioRegister(){
  if(!bioSupported()) return false;
  try{
    const cred=await navigator.credentials.create({ publicKey:{
      challenge:randBytes(32), rp:{ name:'VacuPet' },
      user:{ id:randBytes(16), name:'vacupet', displayName:'VacuPet' },
      pubKeyCredParams:[{ type:'public-key', alg:-7 }, { type:'public-key', alg:-257 }],
      authenticatorSelection:{ authenticatorAttachment:'platform', userVerification:'required' }, timeout:60000,
    }});
    data.lock = Object.assign({}, data.lock, { bioId:bytesToB64(new Uint8Array(cred.rawId)) }); save();
    return true;
  }catch(e){ console.warn('bio register:', e); return false; }
}
async function bioUnlock(){
  const l=data.lock; if(!l||!l.bioId||!bioSupported()) return false;
  try{
    await navigator.credentials.get({ publicKey:{ challenge:randBytes(32), allowCredentials:[{ type:'public-key', id:b64ToBytes(l.bioId) }], userVerification:'required', timeout:60000 } });
    return true;
  }catch(e){ console.warn('bio unlock:', e); return false; }
}

   Viajero (pasaporte), veterinarias cercanas y logros
   ====================================================================== */
const DESTINOS = [
  { key:'ue',         reqs:['microchip','rabia','titulacion','desparasitacion','certificado'] },
  { key:'uk',         reqs:['microchip','rabia','desparasitacion','certificado'] },
  { key:'us',         reqs:['microchip','rabia','certificado'] },
  { key:'rabiesfree', reqs:['microchip','rabia','titulacion','certificado'] },
  { key:'latam',      reqs:['rabia','certificado'] },
];
function hasValidRabies(pet){
  const today=todayISO();
  return (pet.vaccines||[]).some(v=>{
    if(!isRabies(v.nombre)) return false;
    if(v.proxima) return v.proxima>=today;             // refuerzo futuro → vigente
    // Sin próxima: vigente si la aplicación entra dentro de la ventana del país (12/36 meses).
    if(v.fecha)  return v.fecha<=today && toISO(addMonths(parseISO(v.fecha), rabiesMonths()))>=today;
    return false;
  });
}
function recentDeworm(pet){
  const today=todayISO();
  return (pet.dewormings||[]).some(d=>d.fecha && daysBetween(d.fecha,today)<=30 && daysBetween(d.fecha,today)>=0);
}
function checkReq(pet, key){
  if(key==='microchip')       return pet.info.microchip ? 'met' : 'warn';
  if(key==='rabia')           return hasValidRabies(pet) ? 'met' : 'warn';
  if(key==='desparasitacion') return recentDeworm(pet) ? 'met' : 'warn';
  if(key==='titulacion' || key==='certificado') return 'manual'; // trámite externo
  return 'warn';
}
function reqRow(pet, key){
  const st=checkReq(pet,key);
  const cls = st==='met'?'c-green':st==='manual'?'c-blue':'c-amber';
  const icon = st==='met'?I.check:st==='manual'?I.info:I.bell;
  const label = st==='met'?t('st_met'):st==='manual'?t('st_manual'):t('st_warn');
  return `<div class="rec"><span class="ic ${cls}">${icon}</span><div class="rr"><b>${esc(t('req_'+key))}</b><span>${esc(label)}</span></div></div>`;
}
function travelBody(destKey){
  const pet=activePet(); const dest=DESTINOS.find(d=>d.key===destKey)||DESTINOS[0];
  return `<div class="field" style="margin-top:0"><label>${t('travel_pick')}</label>
      <select id="travelDest">${DESTINOS.map(d=>`<option value="${d.key}" ${d.key===destKey?'selected':''}>${esc(t('dest_'+d.key))}</option>`).join('')}</select></div>
    <div class="card" style="margin-top:12px">${dest.reqs.map(k=>reqRow(pet,k)).join('')}</div>
    <p class="hint" style="margin-top:12px">${esc(t('travel_disc'))}</p>`;
}

function isLost(pet){ return !!(pet && pet.lost && pet.lost.active); }
function emergencyPayload(pet){
  const i=pet.info||{}, o=data.owner||{};
  const p={ app:'vacupet', e:1, n:i.nombre||'', sp:i.especie||'otro', rz:i.raza||'', mc:i.microchip||'',
    al:i.alergias||'', co:i.condiciones||'', sa:i.sangre||'', on:o.nombre||'', op:o.telefono||'', an:o.altNombre||'', ap:o.altTelefono||'' };
  if(isLost(pet)) p.lost={ rw:(pet.lost.reward||''), ls:(pet.lost.lastSeen||''), nt:(pet.lost.note||'') };
  return p;
}
function emergencyLink(pet){ return location.origin+location.pathname+'#e='+b64urlEncode(JSON.stringify(emergencyPayload(pet))); }
function decodeEmergency(h){ try{ const o=JSON.parse(b64urlDecode(h)); return (o && o.app==='vacupet' && o.e) ? o : null; }catch(e){ return null; } }

/* ======================================================================
   Cuidados y recordatorios propios (baño, uñas, medicación, cumpleaños…)
   ====================================================================== */
const CARE_KINDS = [
  { key:'cita', icon:'📅', cada:0 },
  { key:'bano', icon:'🛁', cada:30 },
  { key:'unas', icon:'✂️', cada:30 },
  { key:'medic', icon:'💊', cada:0 },
  { key:'grooming', icon:'🧼', cada:60 },
  { key:'cumple', icon:'🎂', cada:365 },
  { key:'otro', icon:'⭐', cada:0 },
];
function freqLabel(n){ if(!n) return t('care_freq_none'); if(n===365) return t('care_yearly'); return tf('care_every',{n}); }
function nextAnniversary(nac){
  const d=parseISO(nac); if(!d) return '';
  const today=new Date(); today.setHours(0,0,0,0);
  let cand=new Date(today.getFullYear(), d.getMonth(), d.getDate()); cand.setHours(0,0,0,0);
  if(cand<today) cand=new Date(today.getFullYear()+1, d.getMonth(), d.getDate());
  return toISO(cand);
}
function dueTagFor(fecha){
  if(!fecha) return '';
  const st=statusOf(fecha); const cls=st==='vencida'?'c-red':st==='proxima'?'c-amber':'c-green';
  const txt=st==='vencida'?t('tag_overdue'):st==='proxima'?tf('due_in',{n:daysBetween(todayISO(),fecha)}):t('tag_next');
  return `<span class="tagdue ${cls}">${txt}</span>`;
}
function careRow(c, ro){
  const k=CARE_KINDS.find(x=>x.key===c.kind)||{icon:'⭐'};
  const sub=[c.fecha?fmt(c.fecha):'', c.cada?freqLabel(c.cada):''].filter(Boolean).join(' · ');
  return `<div class="rec"><span class="ic c-violet">${I.heart}</span>
    <div class="rr"${ro?'':` data-edit="cuidado" data-id="${c.id}" style="cursor:pointer"`}><b>${k.icon} ${esc(c.titulo)}</b><span>${esc(sub)}${c.proxima?` · ${t('next').toLowerCase()} ${fmt(c.proxima)}`:''}</span></div>
    <div class="meta">${dueTagFor(c.proxima)}</div>
    ${ro?'':`<button class="iconmini" data-del="cuidado" data-id="${c.id}" aria-label="${t('delete')}">${I.trash}</button>`}</div>`;
}
function careModal(existing){
  const pet=activePet(); const e=existing||{}; let kind=e.kind||'bano';
  const body=`
    <div class="field"><label>${t('care_kind')}</label><select id="c-kind">${CARE_KINDS.map(k=>`<option value="${k.key}" ${kind===k.key?'selected':''}>${k.icon} ${esc(t('care_'+k.key))}</option>`).join('')}</select></div>
    <div class="field"><label>${t('care_title')}</label><input id="c-title" value="${esc(e.titulo||'')}"></div>
    <div class="two"><div class="field" id="f-cfecha"><label>${t('care_last')} *</label><input type="date" id="c-fecha" value="${esc(e.fecha||todayISO())}"><div class="errmsg">—</div></div>
      <div class="field"><label>${t('care_freq')}</label><select id="c-freq"><option value="0">${t('care_freq_none')}</option>${[7,15,30,60,90,180,365].map(n=>`<option value="${n}" ${Number(e.cada)===n?'selected':''}>${esc(freqLabel(n))}</option>`).join('')}</select></div></div>
    <div class="field"><label>${t('next')}</label><input type="date" id="c-proxima" value="${esc(e.proxima||'')}"><div class="hint" id="c-sug"></div></div>
    <div class="field"><label>${t('care_notes')}</label><textarea id="c-notas">${esc(e.notas||'')}</textarea></div>`;
  openModal(modalShell(existing?t('edit'):t('reg_care'), body, FOOT('saveCare')));
  const kindSel=document.getElementById('c-kind'), titleEl=document.getElementById('c-title'), freqEl=document.getElementById('c-freq');
  function recalc(){ const f=Number(freqEl.value), base=val('c-fecha'); let px='';
    if(kind==='cita' && base) px=base;   // la cita usa su propia fecha como próxima (recordatorio)
    else if(kind==='cumple' && pet.info.nacimiento) px=nextAnniversary(pet.info.nacimiento);
    else if(f>0 && base) px=toISO(addDays(parseISO(base),f));
    const sug=document.getElementById('c-sug'), pe=document.getElementById('c-proxima');
    if(px){ sug.textContent=`${{es:'Sugerencia',en:'Suggestion',pt:'Sugestão'}[data.lang||'es']}: ${fmt(px)}`; if(!pe.value) pe.value=px; } else sug.textContent=''; }
  function applyKind(){ const k=CARE_KINDS.find(x=>x.key===kindSel.value); kind=kindSel.value;
    if(titleEl.dataset.auto!=='0'){ titleEl.value=t('care_'+kind); titleEl.dataset.auto='1'; }
    freqEl.value=String(k.cada||0); document.getElementById('c-proxima').value=''; recalc(); }
  titleEl.dataset.auto = existing ? '0' : '1';   // al editar, no sobreescribas el título
  titleEl.addEventListener('input',()=>titleEl.dataset.auto='0');
  kindSel.onchange=applyKind; freqEl.onchange=()=>{document.getElementById('c-proxima').value='';recalc();};
  document.getElementById('c-fecha').onchange=()=>{document.getElementById('c-proxima').value='';recalc();};
  if(!existing) applyKind();    // solo autorrellena en alta nueva
  document.getElementById('saveCare').onclick=()=>{ const fecha=val('c-fecha'); if(!fecha){document.getElementById('f-cfecha').classList.add('err');return;}
    const rec={ kind, titulo:val('c-title').trim()||t('care_'+kind), fecha, cada:Number(val('c-freq')), proxima:val('c-proxima'), notas:val('c-notas').trim() };
    if(existing){ Object.assign(existing, rec); } else { pet.cares.push({ id:uid(), ...rec }); }
    save(); closeModal(); toast(t('saved_care')); render(); successPop(); };
}

function photoImgTag(p){ return p.path ? `<img data-storage="${esc(p.path)}" alt="">` : `<img src="${p.img||''}" alt="">`; }
function albumHTML(pet){

function pickAlbumPhoto(){
  const pet=activePet(); const inp=document.getElementById('photoInput'); inp.value='';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; compressImage(f, async url=>{
    const id=uid();
    if(session){ toast(t('uploading'));
      const path=`${session.user.id}/${pet.info.id}/album-${id}.jpg`;
      const stored=await sbUploadDataUrl(url, path, 'image/jpeg');
      if(stored){ pet.album.push({id, path:stored, fecha:todayISO()}); save(); toast(t('album_saved')); render(); return; }
      // La subida falló: guardamos en local, pero NO lo anunciamos como si
      // estuviera en la nube (además esta base64 engorda el almacenamiento).
      pet.album.push({id, img:url, fecha:todayISO()}); save(); toast(t('album_saved_local'),'error'); render(); return;
    }
    pet.album.push({id, img:url, fecha:todayISO()}); save(); toast(t('album_saved')); render();
  }, 900); };
  inp.click();
}
async function viewPhoto(id){
  const pet=activePet(); const ph=(pet.album||[]).find(x=>x.id===id); if(!ph) return;
  let src = ph.img || '';
  if(ph.path){ src = await sbSignedUrl(ph.path) || ''; }
  openModal(modalShell(fmt(ph.fecha), `<div class="lightbox"><img src="${src}" alt=""></div>`,
    `<button class="btn btn-danger" data-delphoto="${id}" style="flex:none" aria-label="${t('delete')}">${I.trash}</button><button class="btn btn-block" data-close>${t('close')}</button>`));
}
function pickDoc(){
  const pet=activePet(); const inp=document.getElementById('docInput'); inp.value=''; inp.accept='image/*,application/pdf';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    const finish=async (data)=>{
      const id=uid();
      const ext=(f.name.split('.').pop()||'bin').toLowerCase();
      if(session){ toast(t('uploading'));
        const path=`${session.user.id}/${pet.info.id}/doc-${id}.${ext}`;
        const stored=await sbUploadDataUrl(data, path, f.type);
        if(stored){ pet.docs.push({id, name:f.name, mime:f.type, path:stored, fecha:todayISO()}); save(); toast(t('doc_saved')); render(); return; }
      }
      if((data||'').length > 2400000){ toast(t('doc_big')); return; }
      pet.docs.push({id, name:f.name, mime:f.type, data, fecha:todayISO()}); save(); toast(t('doc_saved')); render();
    };
    if((f.type||'').startsWith('image/')) compressImage(f, finish, 1200);
    else { const r=new FileReader(); r.onload=()=>finish(r.result); r.readAsDataURL(f); }
  };
  inp.click();
}
async function openDoc(id){
  const pet=activePet(); const d=(pet.docs||[]).find(x=>x.id===id); if(!d) return;
  let src = d.data || '';
  if(d.path){ src = await sbSignedUrl(d.path) || ''; }
  if(!src){ toast(t('ocr_err')); return; }
  const w=window.open(); if(w){ w.document.title=d.name||'Documento'; w.document.body.style.margin='0'; w.document.write(`<iframe src="${src}" style="border:0;width:100vw;height:100vh"></iframe>`); }
}

   PWA — service worker, instalación (A2HS) y avisos locales
   ====================================================================== */
let installPrompt = null;   // evento beforeinstallprompt diferido

// En la app nativa (Capacitor) los assets ya vienen empaquetados: registrar el
// service worker solo añadiría una capa de caché que sirve contenido obsoleto.
if('serviceWorker' in navigator && !isNative()){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js').then(reg=>{
      // Aviso de nueva versión: cuando un worker nuevo queda instalado y ya había uno activo.
      reg.addEventListener('updatefound', ()=>{
        const nw=reg.installing; if(!nw) return;
        nw.addEventListener('statechange', ()=>{ if(nw.state==='installed' && navigator.serviceWorker.controller) toast(t('update_ready')); });
      });
    }).catch(()=>{});
  });
}
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); installPrompt = e;
  if(!shared && currentTab==='more') render();   // muestra el tile de instalar
});
window.addEventListener('appinstalled', ()=>{ installPrompt=null; toast(t('installed')); if(currentTab==='more') render(); });

async function doInstall(){
  if(!installPrompt) return;
  installPrompt.prompt();
  try{ await installPrompt.userChoice; }catch(_){}
  installPrompt=null; render();
}

// Avisos locales: pide permiso y, si hay VAPID, suscribe push (listo para Fase 4).
async function enableNotifs(){
  if(!('Notification' in window)){ toast(t('notif_unsupported')); return; }
  let perm = Notification.permission;
  if(perm==='default') perm = await Notification.requestPermission();
  if(perm==='granted'){ data.notifs=true; save(); trySubscribePush(); scheduleLocalNotifs(); toast(t('notif_enabled')); }
  else { toast(t('notif_blocked')); }
  render();
}
async function trySubscribePush(){
  try{
    const cfg = window.VACUPET_AI || {};
    if(!cfg.vapidPublicKey || !('serviceWorker' in navigator)) return; // sin servidor todavía (Fase 4)
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8(cfg.vapidPublicKey) });
    const subJSON = sub.toJSON ? sub.toJSON() : sub;
    localStorage.setItem('vacupet:pushsub', JSON.stringify(subJSON));
    // Si hay sesión, registra la suscripción en Supabase (la usa la función vacupet-push).
    const c = await ensureSupabase();
    if(c && session){
      await c.from('push_subs').upsert({ endpoint: subJSON.endpoint, user_id: session.user.id, sub: subJSON, lang: data.lang||'es' });
    }
  }catch(e){ console.warn('push subscribe:', e); }
}
async function testNotif(){
  const pet = activePet(); const s = pet ? petSummary(pet) : null;
  const body = s && s.next ? `${s.next.nombre} · ${fmt(s.next.fecha)}` : t('notif_test_body');
  try{
    if('serviceWorker' in navigator){ const reg = await navigator.serviceWorker.ready; await reg.showNotification('VacuPet', { body, icon:'./icon.svg', badge:'./icon.svg', tag:'vacupet-test' }); }
    else new Notification('VacuPet', { body });
    toast(t('notif_test_sent'));
  }catch(e){ try{ new Notification('VacuPet', { body }); toast(t('notif_test_sent')); }catch(_){ console.warn(e); } }
}
function notifTileAction(){
  if(!('Notification' in window)){ toast(t('notif_unsupported')); return; }
  if(Notification.permission==='granted') testNotif();
  else if(Notification.permission==='denied') toast(t('notif_blocked'));
  else enableNotifs();
}
// ¿Soporta el navegador programar notificaciones a futuro (Notification Triggers)?
function supportsNotifTriggers(){ return typeof window!=='undefined' && 'TimestampTrigger' in window; }
// Programa avisos locales para las próximas fechas (best-effort; solo donde el
// navegador soporta TimestampTrigger). Funciona con la app cerrada vía el SW.
async function scheduleLocalNotifs(){
  try{
    if(!supportsNotifTriggers()) return 0;
    if(!('Notification' in window) || Notification.permission!=='granted') return 0;
    if(!('serviceWorker' in navigator)) return 0;
    const reg = await navigator.serviceWorker.ready;
    // Limpia los avisos VacuPet programados antes (evita duplicados al reprogramar).
    const prev = await reg.getNotifications({ includeTriggered:true }).catch(()=>[]);
    (prev||[]).filter(x=>String(x.tag||'').startsWith('vacupet-rem')).forEach(x=>{ try{ x.close(); }catch(_){} });
    const today = todayISO();
    const upcoming = allReminders().filter(r=>r.fecha>=today).slice(0,30);
    let n=0;
    for(const r of upcoming){
      const when = parseISO(r.fecha); if(!when) continue; when.setHours(9,0,0,0); // 9:00 del día
      if(when.getTime() <= Date.now()) continue;
      await reg.showNotification('VacuPet', {
        tag:`vacupet-rem-${r.petId}-${r.fecha}-${n}`,
        body:`${r.petName}: ${r.nombre} · ${fmt(r.fecha)}`,
        icon:'./icon.svg', badge:'./icon.svg',
        showTrigger: new window.TimestampTrigger(when.getTime())
      });
      n++;
    }
    return n;
  }catch(e){ console.warn('scheduleLocalNotifs:', e); return 0; }
}

  const all=allReminders();
  const notif = ('Notification' in window) && Notification.permission==='granted';
  const cloud = cloudConfigured() && !!session;
  const sched = supportsNotifTriggers();
  const KLABEL={ vacuna:t('ev_vacuna'), 'desparasitación':t('ev_desparasitacion'), cuidado:t('ev_cuidado'), 'medicación':t('ev_medicacion') };
  const ICON={ vacuna:I.syringe, 'desparasitación':I.bug, cuidado:I.heart, 'medicación':I.pill };
  const COL={ vencida:'c-red', proxima:'c-amber', futura:'c-green' };
  const grp=(key,status)=>{ const items=all.filter(r=>r.status===status); if(!items.length) return '';
    return `<div class="block-title" style="margin:14px 2px 6px">${t(key)} · ${items.length}</div><div class="card">${items.map(r=>
      `<div class="rec"><span class="ic ${COL[status]}">${ICON[r.kind]||I.bell}</span><div class="rr"><b>${esc(r.nombre)}</b><span>${esc(r.petName)} · ${esc(KLABEL[r.kind]||r.kind)} · ${fmt(r.fecha)}</span></div><div class="meta">${dueTagFor(r.fecha)}</div></div>`).join('')}</div>`; };
  const statusCard = `<div class="card pad" style="display:grid;gap:8px">
    <div style="display:flex;align-items:center;gap:9px"><span class="ic ${notif?'c-green':'c-muted'}" style="width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none">${I.bell}</span><span style="font-size:13px">${notif?t('rc_channel_local'):t('rc_channel_off')}</span></div>
    ${cloud?`<div style="display:flex;align-items:center;gap:9px"><span class="ic c-blue" style="width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none">${I.shield}</span><span style="font-size:13px">${t('rc_channel_cloud')}</span></div>`:''}
    <div class="hint">${sched?t('rc_sched_on'):t('rc_sched_off')}</div></div>`;
  // Oferta contextual: si hay una desparasitación en la lista, prioriza 'deworm'.
  const hasDeworm = all.some(r=>r.kind==='desparasitación');
  const offer = partnersOn() ? (hasDeworm ? topOffer('deworm') : null) || topOffer('reminders') : null;
  const offerHTML = offer ? `<div style="margin-top:14px">${offerCard(offer,{dismiss:true})}</div>` : '';
  const body = all.length
    ? statusCard + grp('grp_overdue','vencida') + grp('grp_soon','proxima') + grp('grp_future','futura') + offerHTML
    : statusCard + emptyBox(I.bell, t('rc_empty')) + offerHTML;
  const foot = notif
    ? `<button class="btn btn-block" data-close>${t('close')}</button>`
    : `<button class="btn btn-primary" style="flex:1" id="rcEnable">${t('rc_enable')}</button><button class="btn" data-close style="flex:none">${t('close')}</button>`;
  openModal(modalShell(t('rc_title'), body, foot));
  const en=document.getElementById('rcEnable'); if(en) en.onclick=()=>enableNotifs();
}
function urlB64ToUint8(b64){
  const pad='='.repeat((4 - b64.length % 4) % 4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

/* ---------------------------- Arranque ---------------------------- */
const hash0 = location.hash || '';
const tokenMatch = hash0.match(/^#s=([0-9a-fA-F-]{8,})/);   // carné compartido por token
const foundMatch = hash0.match(/^#e=(.+)$/);                // página pública de hallazgo
found = foundMatch ? decodeEmergency(foundMatch[1]) : null;
const careMatch = hash0.match(/^#care=(.+)$/);              // hoja de cuidador
caregiver = careMatch ? decodeCare(careMatch[1]) : null;
shared = readShareHash();                                   // carné compartido en el hash (#v=)
let pendingAdd = null;

if(found || caregiver){
  render();
} else if(tokenMatch){
  // Vista de solo lectura cargada de forma asíncrona vía RPC.
  if(!data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
  loadSharedToken(tokenMatch[1]);
} else {
  if(!shared){
    // Accesos directos del manifest / enlaces: #tab=card, #add=vacuna
    // 'pet' sigue siendo destino válido (sub-vista de Inicio), aunque ya no sea pestaña.
    const mTab = hash0.match(/[#&]tab=([a-z]+)/);  if(mTab && ['home','card','care','pet','more'].includes(mTab[1])) currentTab = mTab[1];
    const mAdd = hash0.match(/[#&]add=([a-z]+)/);   if(mAdd) pendingAdd = mAdd[1];
    if(mTab || mAdd) history.replaceState(null,'',location.pathname);
  }
  if(!shared && !data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
  render();
  // Enlace #demo: crea una mascota de ejemplo si aún no hay ninguna.
  if(!shared && /[#&]demo/.test(hash0) && data.pets.length===0 && demoAllowed()){ history.replaceState(null,'',location.pathname); loadDemoPet(); }
  // Bloqueo: si está activado, cubre la app hasta desbloquear.
  if(!shared && data.lock && data.lock.enabled) showLock();
  // Tras renderizar, abre el modal del acceso directo si procede y hay mascota.
  if(pendingAdd && data.pets.length){
    if(pendingAdd==='vacuna') vaccineModal();
    else if(pendingAdd==='desparasitacion') dewormModal();
  }
  // Nube: restaura sesión y sincroniza (si está configurada). No bloquea el arranque local.
  if(!shared && cloudConfigured()){
    ensureSupabase().then(c=>{ if(c && session) pullState(); }).catch(()=>{});
  }
  // Reprograma avisos locales (best-effort) si ya hay permiso concedido.
  if(!shared && ('Notification' in window) && Notification.permission==='granted') scheduleLocalNotifs();
}
