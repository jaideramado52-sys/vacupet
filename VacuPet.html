<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16A34A">
<meta name="description" content="Carné de salud digital para tu mascota: vacunas, desparasitación, peso y recordatorios.">
<title>VacuPet — Carné de salud para mascotas</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<meta property="og:type" content="website">
<meta property="og:title" content="VacuPet — Carné de salud para mascotas">
<meta property="og:description" content="Vacunas, desparasitación, peso y recordatorios para tu mascota. Funciona offline.">
<meta property="og:image" content="./og-image.svg">
<meta name="twitter:card" content="summary_large_image">
<script src="./supabase-config.js" defer></script>
<style>
/* ============================ Sistema de diseño ============================ */
:root{
  --bg:#F4F8F4; --surface:#FFFFFF; --surface-2:#FAFCFA; --ink:#10291A; --muted:#5B6B60;
  --accent:#16A34A; --accent-ink:#0B6B33; --line:#E3ECE5; --line-2:#EEF3EF;
  --green:#16A34A; --amber:#D97706; --red:#DC2626; --blue:#2563EB;
  --radius:16px; --radius-sm:11px; --shadow:0 1px 2px rgba(16,41,26,.05),0 1px 3px rgba(16,41,26,.04);
  --shadow-lg:0 10px 30px rgba(16,41,26,.14);
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,system-ui,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0B130E; --surface:#121C15; --surface-2:#16221A; --ink:#EAF2EC; --muted:#9FB3A6;
    --accent:#22C55E; --accent-ink:#86EFAC; --line:#1E2A22; --line-2:#1A251E;
    --shadow:0 1px 2px rgba(0,0,0,.3); --shadow-lg:0 12px 34px rgba(0,0,0,.5);
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;
  -webkit-font-smoothing:antialiased;min-height:100dvh;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent-ink)}
.hide{display:none !important}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}

/* ---- Header ---- */
header.app{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;
  padding:14px 16px;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line-2);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em;font-size:18px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff}
.brand .logo svg{width:19px;height:19px}
.header-spacer{flex:1}
.langsw{display:flex;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px;box-shadow:var(--shadow)}
.langsw button{border:0;background:none;color:var(--muted);font-size:11.5px;font-weight:700;padding:4px 7px;border-radius:7px}
.langsw button.on{background:var(--accent);color:#fff}
.iconbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--surface);
  display:grid;place-items:center;color:var(--ink);box-shadow:var(--shadow)}
.iconbtn svg{width:18px;height:18px}

/* ---- Layout ---- */
main{max-width:620px;margin:0 auto;padding:16px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
section.block{margin:22px 0 0}
.block-title{font-size:13px;font-weight:650;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 2px 10px;display:flex;align-items:center;justify-content:space-between}

/* ---- Cards ---- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.tile{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);width:100%;text-align:left;color:inherit}
.tile:active{transform:scale(.99)}
.tile .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
.tile .ic svg{width:19px;height:19px}
.tile .tt{flex:1;min-width:0}
.tile .tt b{display:block;font-size:15px}
.tile .tt span{font-size:13px;color:var(--muted)}
.tile .chev{color:var(--muted);flex:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* ---- Color por categoría ---- */
.c-green{background:color-mix(in srgb,var(--green) 13%,var(--surface));color:var(--green)}
.c-amber{background:color-mix(in srgb,var(--amber) 14%,var(--surface));color:var(--amber)}
.c-red{background:color-mix(in srgb,var(--red) 13%,var(--surface));color:var(--red)}
.c-blue{background:color-mix(in srgb,var(--blue) 13%,var(--surface));color:var(--blue)}
.c-accent{background:color-mix(in srgb,var(--accent) 14%,var(--surface));color:var(--accent)}
.c-violet{background:color-mix(in srgb,#7C3AED 13%,var(--surface));color:#7C3AED}

/* ---- Hero ---- */
.hero{padding:18px;display:flex;gap:16px;align-items:center}
.hero h2{font-size:19px}
.hero .sub{color:var(--muted);font-size:14px;margin-top:2px}
.statepill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:650;padding:3px 10px;border-radius:999px;margin-top:8px}
.statepill .dot{width:7px;height:7px;border-radius:50%}

/* ---- Chips ---- */
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:14px}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center;box-shadow:var(--shadow)}
.chip .n{font-size:20px;font-weight:720;letter-spacing:-.02em}
.chip .l{font-size:11px;color:var(--muted);margin-top:1px}

/* ---- Banner ---- */
.banner{display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:var(--radius);margin-top:14px;border:1px solid var(--line)}
.banner .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none}
.banner .ic svg{width:20px;height:20px}
.banner .bb{flex:1;min-width:0}
.banner .bb b{display:block;font-size:14.5px}
.banner .bb span{font-size:12.5px;color:var(--muted)}

/* ---- Carrusel ---- */
.pets-row{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 6px;scrollbar-width:none}
.pets-row::-webkit-scrollbar{display:none}
.petav{flex:none;width:74px;text-align:center;background:none;border:0;padding:0;color:inherit}
.petav .av{width:62px;height:62px;border-radius:50%;margin:0 auto;position:relative;display:grid;place-items:center;
  background:var(--surface-2);border:1px solid var(--line);overflow:hidden;font-size:26px}
.petav .av img{width:100%;height:100%;object-fit:cover}
.petav.active .av{outline:2.5px solid var(--accent);outline-offset:2px}
.petav .nm{font-size:12px;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.petav .ringmini{position:absolute;inset:-4px}
.addpet .av{border-style:dashed;color:var(--muted)}

/* ---- Registros ---- */
.rec{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid var(--line-2)}
.rec:last-child{border-bottom:0}
.rec .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}
.rec .ic svg{width:18px;height:18px}
.rec .rr{flex:1;min-width:0}
.rec .rr b{font-size:14.5px;display:block}
.rec .rr span{font-size:12.5px;color:var(--muted)}
.rec .meta{text-align:right;font-size:12px;flex:none}
.tagdue{display:inline-block;font-size:11px;font-weight:650;padding:2px 8px;border-radius:999px}
.rec .iconmini{color:var(--muted);background:none;border:0;padding:6px;border-radius:8px}
.rec .iconmini svg{width:16px;height:16px;display:block}
.empty{text-align:center;color:var(--muted);padding:34px 20px}
.empty svg{width:40px;height:40px;opacity:.4;margin-bottom:10px}

/* ---- Botones ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:46px;padding:0 18px;border-radius:13px;
  border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:15px;box-shadow:var(--shadow)}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--accent);border-color:transparent;color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 40%,transparent)}
.btn-block{width:100%}
.btn-ghost{background:transparent;border-color:transparent;box-shadow:none;color:var(--accent-ink)}
.btn-danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 30%,var(--line))}
.row-actions{display:flex;gap:10px;margin-top:14px}

/* ---- Formularios ---- */
.field{margin-top:13px}
.field label{display:block;font-size:13px;font-weight:600;margin:0 0 6px 2px;color:var(--ink)}
.field .hint{font-size:12px;color:var(--muted);margin-top:5px}
input,select,textarea{
  width:100%;height:46px;padding:0 13px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface-2);color:var(--ink);font-size:15px;font-family:inherit;outline:none
}
textarea{height:auto;padding:11px 13px;min-height:64px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
.field.err input,.field.err select{border-color:var(--red)}
.field .errmsg{color:var(--red);font-size:12px;margin-top:5px;display:none}
.field.err .errmsg{display:block}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.seg{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px}
.seg button{flex:1;height:38px;border:0;border-radius:9px;background:transparent;color:var(--muted);font-weight:600;font-size:14px}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* ---- Gráfico de peso ---- */
.chartwrap{padding:14px 8px 6px}
.chartwrap svg{width:100%;height:auto;display:block;overflow:visible}
.chart-line{fill:none;stroke:var(--accent);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.chart-dot{fill:var(--surface);stroke:var(--accent);stroke-width:2}
.chart-area{fill:color-mix(in srgb,var(--accent) 12%,transparent)}
.chart-lbl{fill:var(--muted);font-size:10px}

/* ---- Tabbar ---- */
nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:saturate(160%) blur(14px);border-top:1px solid var(--line-2)}
nav.tabbar button{flex:1;max-width:120px;border:0;background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;font-size:11px;font-weight:600}
nav.tabbar button svg{width:23px;height:23px}
nav.tabbar button.on{color:var(--accent)}

/* ---- Modal ---- */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(8,18,12,.5);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);width:100%;max-width:620px;max-height:92dvh;overflow-y:auto;
  border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);animation:up .28s cubic-bezier(.2,.8,.2,1)}
@media(min-width:640px){.scrim{align-items:center}.modal{border-radius:22px}}
@keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.modal-head{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line-2);z-index:1}
.modal-head h3{flex:1;font-size:17px}
.modal-head .x{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);display:grid;place-items:center;color:var(--muted)}
.modal-body{padding:16px 18px 22px}
.modal-foot{position:sticky;bottom:0;background:var(--surface);padding:12px 18px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line-2);display:flex;gap:10px}
.infosheet p{margin:0 0 4px}
.infosheet .ib{padding:13px 0;border-bottom:1px solid var(--line-2)}
.infosheet .ib:last-child{border-bottom:0}
.infosheet .ib b{font-size:13px;color:var(--muted);font-weight:650;text-transform:uppercase;letter-spacing:.03em}
.catbadge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.qrbox{display:grid;place-items:center;padding:16px;background:#fff;border-radius:14px;margin-top:14px}
.qrbox img,.qrbox table{width:200px;height:200px}
.linkbox{display:flex;gap:8px;margin-top:12px}
.linkbox input{font-size:12px;color:var(--muted)}

/* ---- Asistente (chat) ---- */
.fab{position:fixed;right:16px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:38;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:0;box-shadow:var(--shadow-lg);display:grid;place-items:center}
.fab svg{width:24px;height:24px}
.chat{display:flex;flex-direction:column;height:90dvh}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:9px}
.bub{max-width:84%;padding:10px 13px;border-radius:16px;font-size:14.5px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
.bub.bot{background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:5px;align-self:flex-start}
.bub.user{background:var(--accent);color:#fff;border-bottom-right-radius:5px;align-self:flex-end}
.bub .inline-actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.bub .ia-btn{border:1px solid var(--line);background:var(--surface);color:var(--accent-ink);border-radius:999px;padding:6px 11px;font-size:13px;font-weight:600}
.chips-row{display:flex;gap:7px;overflow-x:auto;padding:0 16px 8px;scrollbar-width:none}
.chips-row::-webkit-scrollbar{display:none}
.chip-btn{flex:none;border:1px solid var(--line);background:var(--surface);color:var(--accent-ink);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:600;white-space:nowrap}
.chat-input{display:flex;gap:8px;padding:12px 16px 6px;border-top:1px solid var(--line-2);background:var(--surface)}
.chat-input input{flex:1}
.chat-input .btn{height:46px;padding:0 14px}
.chat-disc{font-size:11px;color:var(--muted);text-align:center;padding:4px 16px calc(10px + env(safe-area-inset-bottom))}
/* ---- OCR review ---- */
.ocr-item{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line-2)}
.ocr-item:last-child{border-bottom:0}
.ocr-item input[type=checkbox]{width:20px;height:20px;flex:none}
.ocr-item .oi{flex:1;min-width:0}
.ocr-item .oi b{font-size:14px;display:block}
.ocr-item .oi span{font-size:12.5px;color:var(--muted)}

/* ---- Toast ---- */
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Foto ---- */
.photo-pick{display:flex;align-items:center;gap:14px}
.photo-pick .pv{width:64px;height:64px;border-radius:16px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;display:grid;place-items:center;font-size:28px;flex:none}
.photo-pick .pv img{width:100%;height:100%;object-fit:cover}

/* ---- Compartido (solo lectura) ---- */
.sharebar{background:var(--accent);color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:600;display:flex;gap:10px;align-items:center;justify-content:center}
.sharebar button{background:rgba(255,255,255,.2);color:#fff;border:0;border-radius:9px;padding:6px 12px;font-weight:600;font-size:13px}
.vbadge{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:11px 14px;border-radius:13px;font-size:13.5px;font-weight:650;border:1px solid var(--line)}
.vbadge svg{width:17px;height:17px}
.vbadge.ok{background:color-mix(in srgb,var(--green) 13%,var(--surface));color:var(--green)}
.vbadge.bad{background:color-mix(in srgb,var(--red) 13%,var(--surface));color:var(--red)}
.vbadge.unk{background:var(--surface-2);color:var(--muted)}

/* ---- Pantalla de bloqueo ---- */
.lockscreen{position:fixed;inset:0;z-index:90;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
.lockscreen .lk-logo{width:64px;height:64px;border-radius:18px;background:var(--accent);display:grid;place-items:center;color:#fff}
.lockscreen .lk-logo svg{width:34px;height:34px}
.lockscreen h2{font-size:20px}
.lockscreen input{max-width:240px;text-align:center;letter-spacing:6px;font-size:20px}
.lockscreen .lk-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:240px}
.lockscreen .lk-err{color:var(--red);font-size:13px;min-height:18px}

.disclaimer{font-size:12px;color:var(--muted);text-align:center;padding:24px 16px 8px;line-height:1.6}

/* ---- Impresión (PDF) ---- */
#printArea{display:none}
@media print{
  body{padding:0;background:#fff;color:#000}
  header.app,nav.tabbar,main,.toast,.scrim,.sharebar{display:none !important}
  #printArea{display:block;padding:24px;font-family:var(--font);color:#000}
  #printArea h1{font-size:22px;margin-bottom:2px}
  #printArea table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12px}
  #printArea th,#printArea td{border:1px solid #ccc;padding:6px 8px;text-align:left}
  #printArea th{background:#f2f2f2}
  #printArea h3{margin:18px 0 4px;font-size:14px}
}
</style>
</head>
<body>

<header class="app">
  <div class="brand"><span class="logo" id="brandLogo"></span> VacuPet</div>
  <div class="header-spacer"></div>
  <div class="langsw" id="langsw" role="group" aria-label="Idioma"></div>
  <button class="iconbtn" id="btnBackup" aria-label="Más opciones"></button>
</header>

<main id="app"></main>
<nav class="tabbar" id="tabbar" role="tablist"></nav>

<div id="lockRoot"></div>
<div id="modalRoot"></div>
<div id="assistantRoot"></div>
<button class="fab hide" id="fab" aria-label="Asistente"></button>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div id="printArea"></div>

<input type="file" id="photoInput" accept="image/*" class="hide">
<input type="file" id="importInput" accept="application/json,.json" class="hide">

<script>
"use strict";
/* ======================================================================
   VacuPet — Fases 0 + 1 (MVP local, carné pro). Todo en localStorage.
   ====================================================================== */

/* ---------------------------- Iconos SVG ---------------------------- */
const I = {
  paw:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="10" r="2.1"/><circle cx="10.5" cy="6.5" r="2.1"/><circle cx="15.5" cy="6.5" r="2.1"/><circle cx="19" cy="10.5" r="2"/><path d="M12.5 11c-2.4 0-4.3 1.7-5.2 3.4-.9 1.7-1.6 3.6.2 4.6 1.2.7 2.6-.2 4-.2s2.8.9 4 .2c1.8-1 .9-2.9 0-4.6C14.8 12.7 14.9 11 12.5 11z"/></svg>',
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg>',
  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 9.5h18M7 14h5"/></svg>',
  pet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.6 3.6-6 8-6s8 2.4 8 6"/></svg>',

function schemeRule(especie,nombre){ return (SCHEME[especie]||SCHEME.otro)[nombre]||null; }

/* ---------------------------- Estado / persistencia ---------------------------- */
const KEY = 'vacupet:data:v1';
let data = load();
let shared = null; // si !=null, estamos en vista de carné compartido (solo lectura)

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ return migrate(JSON.parse(raw)); }
  }catch(e){ console.warn('No se pudo leer el estado:', e); }
  return defaults();
}
function defaults(){ return { v:1, activeId:null, remDays:30, lang:'es', pets:[] }; }
function migrate(d){
  if(!d || typeof d!=='object') return defaults();
  if(!d.v) d.v = 1;
  if(!Array.isArray(d.pets)) d.pets = [];
  if(typeof d.remDays !== 'number') d.remDays = 30;
  if(!d.lang) d.lang = 'es';
  d.pets.forEach(p=>{
    p.info = p.info || {};
    p.vaccines = p.vaccines || [];
    p.dewormings = p.dewormings || [];
    p.weights = p.weights || [];
    p.vetVisits = p.vetVisits || [];
  });
  return d;
}
function save(doSync=true){
  if(doSync) data.updatedAt = new Date().toISOString();
  try{ localStorage.setItem(KEY, JSON.stringify(data)); }
  catch(e){ toast('No se pudo guardar (almacenamiento lleno).'); console.error(e); }
  if(doSync) scheduleSync();
}
function activePet(){ return data.pets.find(p=>p.info.id===data.activeId) || data.pets[0] || null; }

/* ---------------------------- Utilidades ---------------------------- */
let _seq = 0;
function uid(){ _seq++; return 'p'+Date.now().toString(36)+_seq.toString(36); }
function todayISO(){ const d=new Date(); d.setHours(0,0,0,0); return toISO(d); }
function toISO(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${da}`; }
function parseISO(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return dt; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
function monthsBetween(a,b){ return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()); }
function localeOf(){ return {es:'es',en:'en',pt:'pt-BR'}[data.lang||'es']; }
function fmt(s){ const d=parseISO(s); if(!d) return '—'; return d.toLocaleDateString(localeOf(),{day:'2-digit',month:'short',year:'numeric'}); }
function ageText(nac){
  if(!nac) return '';
  const m = monthsBetween(parseISO(nac), new Date()); if(m<0) return '';
  const U={es:['mes','meses','año','años'],en:['month','months','year','years'],pt:['mês','meses','ano','anos']}[data.lang||'es'];
  if(m<12) return `${m} ${m===1?U[0]:U[1]}`;
  const y=Math.floor(m/12), r=m%12;
  return `${y} ${y===1?U[2]:U[3]}${r?` ${r}m`:''}`;
}
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):''; }

/* ---------------------------- Esquema: sugerir próxima ---------------------------- */
function suggestProxima(especie, nombre, fechaISO, nacimientoISO){
  const rule = schemeRule(especie, nombre);
  if(!rule || !fechaISO) return '';
  const base = parseISO(fechaISO);
  const ageMonths = nacimientoISO ? monthsBetween(parseISO(nacimientoISO), base) : null;
  if(rule.tipo==='serie' && ageMonths!=null && ageMonths < 4) return toISO(addDays(base, rule.intervaloDias));
  if(rule.refuerzoMeses) return toISO(addMonths(base, rule.refuerzoMeses));
  return '';
}
function suggestDeworm(tipo, fechaISO){
  if(!fechaISO) return '';
  return toISO(tipo==='externa' ? addMonths(parseISO(fechaISO),1) : addMonths(parseISO(fechaISO),3));
}

/* ---------------------------- Recordatorios ---------------------------- */
function reminders(pet){
  const out=[];
  (pet.vaccines||[]).forEach(v=>{ if(v.proxima) out.push({kind:'vacuna',nombre:v.nombre,fecha:v.proxima}); });
  (pet.dewormings||[]).forEach(d=>{ if(d.proxima) out.push({kind:'desparasitación',nombre:d.producto||(d.tipo==='externa'?t('tile_dew'):t('tile_dew')),fecha:d.proxima}); });
  out.sort((a,b)=>a.fecha<b.fecha?-1:1);
  return out;
}
function statusOf(fecha){
  const today=todayISO();
  if(fecha<today) return 'vencida';
  if(daysBetween(today,fecha)<=data.remDays) return 'proxima';
  return 'futura';
}
function petSummary(pet){
  const rem = reminders(pet);
  const aplicadas = (pet.vaccines||[]).length + (pet.dewormings||[]).length;
  let vencidas=0, proximas=0, next=null;
  rem.forEach(r=>{ const s=statusOf(r.fecha); if(s==='vencida') vencidas++; else if(s==='proxima') proximas++; if(r.fecha>=todayISO()&&!next) next=r; });
  let estado='aldia'; if(vencidas>0) estado='vencidas'; else if(proximas>0) estado='proximas';
  const pending = vencidas+proximas;
  const pct = (aplicadas+pending)===0 ? 0 : Math.round(aplicadas/(aplicadas+pending)*100);
  return {aplicadas,vencidas,proximas,next,estado,pct,rem};
}

/* ---------------------------- Anillo de progreso ---------------------------- */
function ringSVG(pct, color, size=58, sw=6){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 ${size/2} ${size/2})"/></svg>`;
}
function stateMeta(){ return {
  aldia:{label:t('st_aldia'),color:'var(--green)'},
  proximas:{label:t('st_proximas'),color:'var(--amber)'},
  vencidas:{label:t('st_vencidas'),color:'var(--red)'},
};}

/* ---------------------------- Gráfico de peso ---------------------------- */
function weightChart(weights){
  const pts = weights.slice().filter(w=>w.fecha&&w.kg).sort((a,b)=>a.fecha<b.fecha?-1:1)
    .map(w=>({x:parseISO(w.fecha).getTime(), y:Number(w.kg)}));
  if(pts.length===0) return '';
  const W=560, H=160, pad=26;
  if(pts.length===1){
    return `<div class="chartwrap"><svg viewBox="0 0 ${W} ${H}"><circle class="chart-dot" cx="${W/2}" cy="${H/2}" r="5"/><text class="chart-lbl" x="${W/2}" y="${H/2-12}" text-anchor="middle">${pts[0].y} kg</text></svg></div>`;
  }
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const sx=x=> pad + (maxX===minX?0:(x-minX)/(maxX-minX))*(W-2*pad);
  const sy=y=> (H-pad) - (maxY===minY?0.5:(y-minY)/(maxY-minY))*(H-2*pad);
  const line = pts.map((p,i)=>`${i?'L':'M'}${sx(p.x).toFixed(1)} ${sy(p.y).toFixed(1)}`).join(' ');
  const area = `M${sx(pts[0].x).toFixed(1)} ${(H-pad)} ` + pts.map(p=>`L${sx(p.x).toFixed(1)} ${sy(p.y).toFixed(1)}`).join(' ') + ` L${sx(pts[pts.length-1].x).toFixed(1)} ${(H-pad)} Z`;
  const dots = pts.map(p=>`<circle class="chart-dot" cx="${sx(p.x).toFixed(1)}" cy="${sy(p.y).toFixed(1)}" r="3.4"/>`).join('');
  return `<div class="chartwrap"><svg viewBox="0 0 ${W} ${H}">
    <path class="chart-area" d="${area}"/><path class="chart-line" d="${line}"/>${dots}
    <text class="chart-lbl" x="${pad}" y="14">${maxY} kg</text>
    <text class="chart-lbl" x="${pad}" y="${H-8}">${minY} kg</text></svg></div>`;
}

/* ---- Carné (historial: vacunas, desparasitación, visitas) ---- */
function vacRow(v, ro){
  const dueTag = v.proxima ? (()=>{ const st=statusOf(v.proxima); const cls=st==='vencida'?'c-red':st==='proxima'?'c-amber':'c-green';
    const txt=st==='vencida'?t('tag_overdue'):st==='proxima'?tf('due_in',{n:daysBetween(todayISO(),v.proxima)}):t('tag_next');
    return `<span class="tagdue ${cls}">${txt}</span>`; })() : '';
  const sub=[fmt(v.fecha), v.dosis&&`${v.dosis}`, v.lugar].filter(Boolean).join(' · ');
  const ap = activePet();
  const hasInfo = !ro && ap && !!schemeRule(ap.info.especie, v.nombre);
  return `<div class="rec">
    <span class="ic c-accent">${I.syringe}</span>
    <div class="rr"><b>${esc(v.nombre)}</b><span>${esc(sub)}${v.proxima?` · ${t('next').toLowerCase()} ${fmt(v.proxima)}`:''}</span></div>
    <div class="meta">${dueTag}</div>
    ${ro?'':`${hasInfo?`<button class="iconmini" data-info="${esc(v.nombre)}" aria-label="info">${I.info}</button>`:''}<button class="iconmini" data-del="vacuna" data-id="${v.id}" aria-label="${t('delete')}">${I.trash}</button>`}
  </div>`;
}
function dewRow(d, ro){
  const dueTag = d.proxima ? (()=>{ const st=statusOf(d.proxima); const cls=st==='vencida'?'c-red':st==='proxima'?'c-amber':'c-green';
    const txt=st==='vencida'?t('tag_overdue'):st==='proxima'?tf('due_in',{n:daysBetween(todayISO(),d.proxima)}):t('tag_next');
    return `<span class="tagdue ${cls}">${txt}</span>`; })() : '';
  const title=d.producto||(d.tipo==='externa'?'Externa':'Interna');
  const sub=[fmt(d.fecha), d.tipo==='externa'?'externa':'interna', d.peso?d.peso+' kg':''].filter(Boolean).join(' · ');
  return `<div class="rec"><span class="ic c-blue">${I.bug}</span>
    <div class="rr"><b>${esc(title)}</b><span>${esc(sub)}${d.proxima?` · ${t('next').toLowerCase()} ${fmt(d.proxima)}`:''}</span></div>
    <div class="meta">${dueTag}</div>
    ${ro?'':`<button class="iconmini" data-del="desparasitacion" data-id="${d.id}" aria-label="${t('delete')}">${I.trash}</button>`}</div>`;
}
function visitRow(v, ro){
  const sub=[fmt(v.fecha), v.clinica].filter(Boolean).join(' · ');
  return `<div class="rec"><span class="ic c-violet">${I.stetho}</span>
    <div class="rr"><b>${esc(v.motivo||'Visita')}</b><span>${esc(sub)}${v.diagnostico?` · ${esc(v.diagnostico)}`:''}</span></div>
    ${ro?'':`<button class="iconmini" data-del="visita" data-id="${v.id}" aria-label="${t('delete')}">${I.trash}</button>`}</div>`;
}

/* ---- Compartir ---- */
async function shareModal(){
  const pet=activePet();
  const petPayload = { info:{...pet.info, foto:undefined}, vaccines:pet.vaccines, dewormings:pet.dewormings };
  // Si hay servicio de firma, pide un token de integridad (ES256). Si no, va sin firmar.
  let token = null;
  if((window.VACUPET_AI||{}).signEndpoint){ toast(t('signing')); token = await buildIntegrityToken(petPayload); }
  const payload = token ? { app:'vacupet', v:1, sig:token } : { app:'vacupet', v:1, pet:petPayload };

  let link = null;
  // Con sesión: crea un enlace con TOKEN que caduca (30 días), sin datos en la URL.
  if(session){
    try{
      const c = await ensureSupabase();
      if(c){
        const expires = new Date(Date.now()+30*86400000).toISOString();
        const { data:row, error } = await c.from('shares').insert({ user_id:session.user.id, data:payload, expires_at:expires }).select('id').single();
        if(!error && row) link = location.origin+location.pathname+'#s='+row.id;
      }
    }catch(e){ console.warn('share token:', e); }
  }
  // Sin sesión (o si falló): el carné viaja codificado en el propio enlace (#v=).
  if(!link){ try{ link = location.origin+location.pathname+'#v='+b64urlEncode(JSON.stringify(payload)); }catch(e){ toast('No se pudo generar el enlace'); return; } }

  const body=`<p class="hint">${t('m_share_sub')}</p>
    <div class="qrbox" id="qrbox"><span class="hint">QR…</span></div>
    <div class="linkbox"><input id="shareLink" readonly value="${esc(link)}"><button class="btn" id="copyLink" aria-label="${t('copied')}">${I.copy}</button></div>`;
  openModal(modalShell(t('m_share'), body, `<button class="btn btn-block" data-close>${t('close')}</button>`));
  document.getElementById('copyLink').addEventListener('click', async ()=>{ try{ await navigator.clipboard.writeText(link); }catch(_){ const i=document.getElementById('shareLink'); i.select(); document.execCommand&&document.execCommand('copy'); } toast(t('copied')); });
  ensureQR(ok=>{ const box=document.getElementById('qrbox'); if(!box) return;
    if(ok && window.qrcode){ try{ const qr=window.qrcode(0,'M'); qr.addData(link); qr.make(); box.innerHTML=qr.createImgTag(4,0); }catch(e){ box.innerHTML='<span class="hint">QR no disponible offline</span>'; } }
    else box.innerHTML='<span class="hint">QR no disponible offline</span>'; });
}

// Carga un carné compartido por TOKEN (#s=<uuid>) vía RPC get_share (lectura pública si no ha caducado).
async function loadSharedToken(token){
  renderChrome();
  document.getElementById('app').innerHTML = `<div class="view"><div class="card pad empty">${t('loading')}</div></div>`;
  const c = await ensureSupabase();
  if(!c){ document.getElementById('app').innerHTML = `<div class="view"><div class="card pad empty">${t('shared_bad')}</div></div>`; return; }
  try{
    const { data:payload, error } = await c.rpc('get_share', { p_token: token });
    const pet = decodeShareObj(payload);
    if(error || !pet) throw new Error('bad');
    shared = pet; render();
  }catch(e){ console.warn('get_share:', e); document.getElementById('app').innerHTML = `<div class="view"><div class="card pad empty">${t('shared_bad')}</div></div>`; }
}
let qrLoading=false;
function ensureQR(cb){
  if(window.qrcode) return cb(true);
  if(qrLoading){ return cb(false); }
  qrLoading=true;
  const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js';
  s.onload=()=>cb(true); s.onerror=()=>cb(false); document.head.appendChild(s);
}

/* ======================================================================
   Foto: compresión
   ====================================================================== */
function compressImage(file, cb){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image();
    img.onload=()=>{ const max=512, scale=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.78)); };
    img.onerror=()=>toast('No se pudo leer la imagen'); img.src=e.target.result; };
  reader.readAsDataURL(file);
}

/* ======================================================================
   Compartir: codificación base64url + lectura del hash
   ====================================================================== */
function b64urlEncode(str){ return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDecode(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4) s+='='; return decodeURIComponent(escape(atob(s))); }

// Convierte un carné compartido (firmado o no) en {pet} + fija sharedSig si lo lleva.
let sharedSig = null;
function decodeShareObj(obj){
  if(!obj || obj.app!=='vacupet') return null;
  if(obj.sig){ try{ const pet=JSON.parse(b64urlDecode(obj.sig.split('.')[1])); sharedSig=obj.sig; return pet; }catch(e){ return null; } }
  if(obj.pet){ sharedSig=null; return obj.pet; }
  return null;
}
function readShareHash(){
  const h=location.hash||'';
  if(h.startsWith('#v=')){ try{ return decodeShareObj(JSON.parse(b64urlDecode(h.slice(3)))); }catch(e){ console.warn(e); } }
  return null;
}

/* ---- Integridad (QR firmado, ES256 / WebCrypto) ---- */
async function buildIntegrityToken(payload){
  const ai=window.VACUPET_AI||{};
  if(!ai.signEndpoint) return null;
  try{
    const r=await fetch(ai.signEndpoint,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ payload }) });
    const j=await r.json(); return j.token||null;
  }catch(e){ console.warn('sign:', e); return null; }
}
async function verifyIntegrity(token, signEndpoint){
  try{
    const parts=token.split('.'); if(parts.length!==3) return false;
    const [h,p,s]=parts;
    const jwksUrl = signEndpoint + (signEndpoint.includes('?')?'&':'?') + 'jwks=1';
    const jwks = await (await fetch(jwksUrl)).json();
    const header = JSON.parse(b64urlDecode(h));
    const jwk = (jwks.keys||[]).find(k=>k.kid===header.kid) || (jwks.keys||[])[0];
    if(!jwk) return false;
    const key = await crypto.subtle.importKey('jwk', jwk, { name:'ECDSA', namedCurve:'P-256' }, false, ['verify']);
    const sig = urlB64ToUint8(s);
    const dataBytes = new TextEncoder().encode(h+'.'+p);
    return await crypto.subtle.verify({ name:'ECDSA', hash:'SHA-256' }, key, sig, dataBytes);
  }catch(e){ console.warn('verify:', e); return false; }
}
async function runShareVerify(){
  const badge=document.getElementById('vbadge'); if(!badge || !sharedSig) return;
  const ai=window.VACUPET_AI||{};
  if(!ai.signEndpoint){ badge.className='vbadge unk'; badge.innerHTML=I.info+' '+esc(t('verify_unknown')); return; }
  const okv = await verifyIntegrity(sharedSig, ai.signEndpoint);
  badge.className = 'vbadge '+(okv?'ok':'bad');
  badge.innerHTML = (okv?I.check:I.x)+' '+esc(okv?t('verify_ok'):t('verify_bad'));
}

/* ======================================================================
   Nube (Supabase) — auth por email/OTP + sync de vacupet_state.
   Degradación: si no hay config, todo funciona en local.
   ====================================================================== */
const SB = window.VACUPET_SUPABASE || {};
function cloudConfigured(){ return !!(SB.url && SB.anonKey); }
let supa = null;     // cliente
let session = null;  // sesión actual
let syncT = null;    // debounce del push

function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

async function ensureSupabase(){
  if(supa) return supa;
  if(!cloudConfigured()) return null;
  try{
    if(!window.supabase) await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js');
    if(!window.supabase) return null;
    supa = window.supabase.createClient(SB.url, SB.anonKey, {
      auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:false } // usamos OTP por código (sin redirección)
    });
    const { data:{ session:s } } = await supa.auth.getSession();
    session = s || null;
    supa.auth.onAuthStateChange((_e, s2)=>{ session=s2; if(!shared && currentTab==='more') render(); });
    return supa;
  }catch(e){ console.warn('supabase init:', e); return null; }
}

// Decide si adoptar el estado remoto (puro, testeable).
function shouldAdoptRemote(remoteUpdatedAt, localUpdatedAt, remoteData){
  if(!remoteData || !Array.isArray(remoteData.pets)) return false;
  const r = remoteUpdatedAt ? Date.parse(remoteUpdatedAt) : 0;
  const l = localUpdatedAt ? Date.parse(localUpdatedAt) : 0;
  return r > l;
}

async function pullState(){
  const c = await ensureSupabase(); if(!c || !session) return;
  try{
    const { data:row, error } = await c.from('vacupet_state').select('data,updated_at').eq('user_id', session.user.id).maybeSingle();
    if(error){ console.warn(error); return; }
    if(!row){ await pushState(true); return; }                 // no hay remoto: sube el local
    if(shouldAdoptRemote(row.updated_at, data.updatedAt, row.data)){
      data = migrate(row.data); data.updatedAt = row.updated_at;
      if(!data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
      save(false);                                             // persiste sin re-empujar
      render(); toast(t('sync_pulled'));
    } else {
      await pushState(true);                                   // local más nuevo o igual: sube
    }
  }catch(e){ console.warn('pull:', e); }
}

async function pushState(silent){
  const c = await ensureSupabase(); if(!c || !session) return;
  try{
    const ts = data.updatedAt || new Date().toISOString(); data.updatedAt = ts;
    const { error } = await c.from('vacupet_state').upsert({ user_id:session.user.id, data, updated_at:ts });
    if(error){ console.warn(error); if(!silent) toast(t('sync_err')); }
    else if(!silent) toast(t('sync_done'));
  }catch(e){ console.warn('push:', e); if(!silent) toast(t('sync_err')); }
}
function scheduleSync(){ if(!session) return; clearTimeout(syncT); syncT=setTimeout(()=>pushState(true), 1500); }

function authModal(){
  const body = `
    <div class="field" id="f-email"><label>${t('auth_email')}</label><input type="email" id="au-email" placeholder="tu@correo.com" autocomplete="email"><div class="errmsg">—</div></div>

      <p class="hint" id="sentHint"></p>

  const footer = `<button class="btn btn-ghost" data-close style="flex:none">${t('cancel')}</button>
    <button class="btn btn-primary btn-block" id="auAction">${t('auth_send')}</button>`;
  openModal(modalShell(t('auth_title'), body, footer));
  let step = 1, email='';
  const action = document.getElementById('auAction');
  action.addEventListener('click', async ()=>{
    if(step===1){
      email = val('au-email').trim();
      if(!/.+@.+\..+/.test(email)){ document.getElementById('f-email').classList.add('err'); document.querySelector('#f-email .errmsg').textContent='Correo no válido'; return; }
      action.disabled=true; action.textContent=t('loading');
      const c = await ensureSupabase();
      if(!c){ toast(t('cloud_off')); action.disabled=false; action.textContent=t('auth_send'); return; }
      const { error } = await c.auth.signInWithOtp({ email });
      action.disabled=false;
      if(error){ toast(error.message); action.textContent=t('auth_send'); return; }
      step=2; document.getElementById('codeStep').classList.remove('hide');
      document.getElementById('sentHint').textContent=t('auth_sent');
      action.textContent=t('auth_verify'); toast(t('auth_sent'));
    } else {
      const token = val('au-code').trim();
      if(!token){ return; }
      action.disabled=true; action.textContent=t('loading');
      const c = await ensureSupabase();
      const { data:res, error } = await c.auth.verifyOtp({ email, token, type:'email' });
      action.disabled=false; action.textContent=t('auth_verify');
      if(error){ toast(error.message); return; }
      session = res.session;
      closeModal(); toast(t('acc_synced'));
      await pullState();
      if(window.Notification && Notification.permission==='granted') trySubscribePush();
      render();
    }
  });
}

function aWhatsMissing(){
  const pet=activePet(); if(!pet) return t('a_none_pet');
  const s=petSummary(pet); const miss=missingVaccines(pet);
  if(s.estado==='aldia' && !miss.length) return tf('a_uptodate',{nombre:pet.info.nombre});
  const parts=[ tf('a_status',{venc:s.vencidas, prox:s.proximas}) ];
  parts.push(miss.length ? tf('a_missing_intro',{especie:cap(pet.info.especie), lista:miss.join(', ')}) : t('a_nomissing'));
  return parts.join('\n');
}
function aNextDose(){
  const pet=activePet(); if(!pet) return t('a_none_pet');
  const s=petSummary(pet); if(!s.next) return t('a_next_none');
  const cuando = s.next.fecha<todayISO()
    ? tf('overdue_ago',{n:Math.abs(daysBetween(s.next.fecha,todayISO()))})

function classify(text){
  const s=(text||'').toLowerCase(); const has=(...a)=>a.some(w=>s.includes(w));
  if(has('cómo funciona','como funciona','explica','explain','how does','how do','recomendador','funciona')) return 'explain';
  if(has('registrar','register','anotar','registr','añadir','adicionar','add ')) return 'register';
  if(has('desparas','antipulg','vermífug','vermifug','deworm','pulga','garrapata','flea','tick')) return 'deworm';
  if(has('falta','missing','faltan')) return 'missing';
  if(has('próxim','proxim','next','dosis','vacuna','vaccine','dose','vacina')) return 'next';
  return 'faq';
}

  if(intent==='missing')  return { html: esc(aWhatsMissing()) };

  if(intent==='register') return aRegister();

/* ======================================================================
   Privacidad y seguridad: PIN, biometría, respaldo cifrado, borrado
   ====================================================================== */
let locked = false;

// --- Criptografía base (WebCrypto) ---
function randBytes(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return a; }
function bytesToB64(bytes){ let s=''; for(let i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]); return btoa(s); }
function b64ToBytes(str){ const bin=atob(str); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }
async function pbkdf2Bits(pass, salt, it, len){
  const km=await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveBits']);
  return new Uint8Array(await crypto.subtle.deriveBits({ name:'PBKDF2', salt, iterations:it, hash:'SHA-256' }, km, len));
}
async function deriveAesKey(pass, salt, it){
  const km=await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:it, hash:'SHA-256' }, km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
const KDF_IT = 150000;

// --- PIN ---
async function hashPin(pin, saltBytes, it){ return bytesToB64(await pbkdf2Bits(pin, saltBytes, it||KDF_IT, 256)); }
async function setPin(pin){
  const salt=randBytes(16);
  const hash=await hashPin(pin, salt, KDF_IT);
  data.lock = Object.assign({}, data.lock, { enabled:true, salt:bytesToB64(salt), hash, it:KDF_IT });
  save();
}
async function checkPin(pin){
  const l=data.lock; if(!l||!l.enabled) return false;
  const h=await hashPin(pin, b64ToBytes(l.salt), l.it||KDF_IT);
  // comparación de longitud constante razonable
  if(h.length!==l.hash.length) return false;
  let diff=0; for(let i=0;i<h.length;i++) diff|=h.charCodeAt(i)^l.hash.charCodeAt(i);
  return diff===0;
}
function disableLock(){ if(data.lock){ delete data.lock; save(); } }

// --- Respaldo cifrado (AES-GCM + PBKDF2) ---
async function encryptBackup(pass){
  const salt=randBytes(16), iv=randBytes(12);
  const key=await deriveAesKey(pass, salt, KDF_IT);
  const pt=new TextEncoder().encode(JSON.stringify(data));
  const ct=new Uint8Array(await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, pt));
  return JSON.stringify({ app:'vacupet', enc:'AES-GCM', kdf:'PBKDF2-SHA256', it:KDF_IT, salt:bytesToB64(salt), iv:bytesToB64(iv), ct:bytesToB64(ct) });
}
async function decryptBackup(envStr, pass){
  const env=JSON.parse(envStr);
  if(env.app!=='vacupet' || !env.ct) throw new Error('bad');
  const key=await deriveAesKey(pass, b64ToBytes(env.salt), env.it||KDF_IT);
  const pt=await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBytes(env.iv) }, key, b64ToBytes(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

// --- Biometría (WebAuthn, gate local best-effort) ---
function bioSupported(){ return typeof window.PublicKeyCredential !== 'undefined' && !!(navigator.credentials); }
async function bioRegister(){
  if(!bioSupported()) return false;
  try{
    const cred=await navigator.credentials.create({ publicKey:{
      challenge:randBytes(32), rp:{ name:'VacuPet' },
      user:{ id:randBytes(16), name:'vacupet', displayName:'VacuPet' },
      pubKeyCredParams:[{ type:'public-key', alg:-7 }, { type:'public-key', alg:-257 }],
      authenticatorSelection:{ authenticatorAttachment:'platform', userVerification:'required' }, timeout:60000,
    }});
    data.lock = Object.assign({}, data.lock, { bioId:bytesToB64(new Uint8Array(cred.rawId)) }); save();
    return true;
  }catch(e){ console.warn('bio register:', e); return false; }
}
async function bioUnlock(){
  const l=data.lock; if(!l||!l.bioId||!bioSupported()) return false;
  try{
    await navigator.credentials.get({ publicKey:{ challenge:randBytes(32), allowCredentials:[{ type:'public-key', id:b64ToBytes(l.bioId) }], userVerification:'required', timeout:60000 } });
    return true;
  }catch(e){ console.warn('bio unlock:', e); return false; }
}

// --- Pantalla de bloqueo ---
function showLock(){
  locked=true;
  const root=document.getElementById('lockRoot');
  const bio = data.lock && data.lock.bioId && bioSupported();
  root.innerHTML=`<div class="lockscreen">
    <div class="lk-logo">${I.lock}</div><h2>VacuPet</h2>
    <input type="password" id="lkPin" inputmode="numeric" autocomplete="off" placeholder="${esc(t('lock_ph'))}" aria-label="${esc(t('lock_ph'))}">
    <div class="lk-err" id="lkErr"></div>
    <div class="lk-actions">
      <button class="btn btn-primary" id="lkGo">${t('lock_unlock')}</button>
      ${bio?`<button class="btn" id="lkBio">${I.finger} ${t('lock_bio')}</button>`:''}
    </div></div>`;
  const tryPin=async()=>{ const ok=await checkPin(document.getElementById('lkPin').value); if(ok) unlock(); else { document.getElementById('lkErr').textContent=t('lock_wrong'); document.getElementById('lkPin').value=''; } };
  document.getElementById('lkGo').onclick=tryPin;
  document.getElementById('lkPin').addEventListener('keydown',e=>{ if(e.key==='Enter') tryPin(); });
  const bb=document.getElementById('lkBio'); if(bb) bb.onclick=async()=>{ if(await bioUnlock()) unlock(); else document.getElementById('lkErr').textContent=t('lock_wrong'); };
  document.getElementById('lkPin').focus();
  if(bio) bioUnlock().then(ok=>{ if(ok&&locked) unlock(); }); // intenta biometría automáticamente
}
function unlock(){ locked=false; document.getElementById('lockRoot').innerHTML=''; render(); }

// --- Modales del centro de privacidad ---
function lockModal(){
  const enabled = !!(data.lock&&data.lock.enabled);
  const body = enabled
    ? `<p class="hint">${t('pv_lock')}: <b>${t('pv_lock_on')}</b></p>
       ${bioSupported()?`<button class="btn btn-block" id="bioToggle" style="margin-top:8px">${I.finger} ${data.lock.bioId?t('lock_bio_on'):t('lock_bio_enable')}</button>`:`<p class="hint">${t('bio_unsupported')}</p>`}
       <button class="btn btn-danger btn-block" id="lockOff" style="margin-top:10px">${t('lock_disable')}</button>`
    : `<div class="field" id="f-p1"><label>${t('lock_new')}</label><input type="password" id="lk-p1" inputmode="numeric" autocomplete="new-password"><div class="errmsg">${t('lock_short')}</div></div>
       <div class="field" id="f-p2"><label>${t('lock_confirm')}</label><input type="password" id="lk-p2" inputmode="numeric" autocomplete="new-password"><div class="errmsg">${t('lock_mismatch')}</div></div>`;
  const foot = enabled ? `<button class="btn btn-block" data-close>${t('close')}</button>`
    : `<button class="btn btn-ghost" data-close style="flex:none">${t('cancel')}</button><button class="btn btn-primary btn-block" id="lockOn">${t('lock_enable')}</button>`;
  openModal(modalShell(t('lock_set_title'), body, foot));
  if(enabled){
    document.getElementById('lockOff').onclick=()=>{ disableLock(); closeModal(); toast(t('lock_disabled')); if(currentTab==='more') render(); };
    const bt=document.getElementById('bioToggle'); if(bt) bt.onclick=async()=>{ if(data.lock.bioId){ delete data.lock.bioId; save(); toast('OK'); } else { const ok=await bioRegister(); toast(ok?t('bio_enabled'):t('bio_unsupported')); } closeModal(); };
  } else {
    document.getElementById('lockOn').onclick=async()=>{
      const p1=val('lk-p1'), p2=val('lk-p2');
      document.getElementById('f-p1').classList.toggle('err', p1.length<4);
      document.getElementById('f-p2').classList.toggle('err', p1!==p2);
      if(p1.length<4 || p1!==p2) return;
      await setPin(p1); closeModal(); toast(t('lock_enabled')); if(currentTab==='more') render();
    };
  }
}
function encBackupModal(){
  const body=`<div class="field"><label>${t('enc_pass')}</label><input type="password" id="enc-pass" autocomplete="off" placeholder="••••••••"></div>
    <div class="row-actions"><button class="btn btn-primary" style="flex:1" id="encExp">${t('enc_export')}</button><button class="btn" id="encImp">${t('enc_import')}</button></div>`;
  openModal(modalShell(t('enc_title'), body, `<button class="btn btn-block" data-close>${t('close')}</button>`));
  document.getElementById('encExp').onclick=async()=>{
    const pass=val('enc-pass'); if(pass.length<4){ toast(t('lock_short')); return; }
    toast(t('enc_working'));
    try{ const env=await encryptBackup(pass); download(`vacupet-cifrado-${todayISO()}.json`, env, 'application/json'); toast(t('enc_done')); }
    catch(e){ console.warn(e); toast(t('enc_bad')); }
  };
  document.getElementById('encImp').onclick=()=>{
    const pass=val('enc-pass'); if(pass.length<1){ toast(t('enc_pass')); return; }
    const inp=document.getElementById('importInput'); inp.value='';
    inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const r=new FileReader();
      r.onload=async()=>{ try{ const d=await decryptBackup(r.result, pass); if(!d||!Array.isArray(d.pets)) throw new Error('bad');
        if(!confirm(t('del_confirm').replace('Borrar','Reemplazar').replace('Erase','Replace').replace('Apagar','Substituir'))) return;
        data=migrate(d); if(!data.activeId&&data.pets[0]) data.activeId=data.pets[0].info.id; save(); closeModal(); toast(t('enc_restored')); go('home');
      }catch(err){ console.warn(err); toast(t('enc_bad')); } }; r.readAsText(f); };
    inp.click();
  };
}
function wipeLocal(){
  if(!confirm(t('del_confirm'))) return;
  try{ localStorage.removeItem(KEY); localStorage.removeItem('vacupet:pushsub'); }catch(_){}
  data=defaults(); locked=false; closeModal&&closeModal(); toast(t('del_done')); go('home');
}
async function deleteAccount(){
  if(!session){ wipeLocal(); return; }
  if(!confirm(t('delacc_confirm'))) return;
  try{
    const c=await ensureSupabase(); const tok=session.access_token || (await c.auth.getSession()).data.session.access_token;
    const url=(SB.url||'').replace(/\/$/,'')+'/functions/v1/eliminar-cuenta';
    const r=await fetch(url,{ method:'POST', headers:{ 'Authorization':'Bearer '+tok, 'Content-Type':'application/json' } });
    if(!r.ok) throw new Error('http '+r.status);
    try{ await c.auth.signOut(); }catch(_){}
    session=null; localStorage.removeItem(KEY); data=defaults(); toast(t('delacc_done')); go('home');
  }catch(e){ console.warn('delete account:', e); toast(t('delacc_err')); }
}

/* ======================================================================
   Eventos (delegación)
   ====================================================================== */
document.addEventListener('click', e=>{
  const t0=e.target;
  if(t0.closest('[data-close]')){ closeModal(); return; }
  // idioma
  const lg=t0.closest('[data-lang]'); if(lg){ data.lang=lg.dataset.lang; save(); render(); return; }
  // compartido: abrir mi app
  if(t0.closest('#openMine')){ shared=null; history.replaceState(null,'',location.pathname); go('home'); return; }
  if(shared) return; // en vista compartida no hay más acciones
  const tab=t0.closest('[data-tab]'); if(tab){ go(tab.dataset.tab); return; }
  const goEl=t0.closest('[data-go]'); if(goEl){ go(goEl.dataset.go); return; }
  if(t0.closest('#btnBackup')){ go('more'); return; }
  if(t0.closest('#onbAdd')||t0.closest('#addPet')){ petModal(null); return; }
  const pa=t0.closest('[data-pet]'); if(pa){ data.activeId=pa.dataset.pet; save(); render(); return; }
  const sw=t0.closest('[data-switch]'); if(sw){ data.activeId=sw.dataset.switch; save(); closeModal(); go('home'); return; }
  if(t0.closest('#switchPet')){ switchModal(); return; }
  const add=t0.closest('[data-add]'); if(add){ const k=add.dataset.add; k==='vacuna'?vaccineModal():k==='desparasitacion'?dewormModal():visitModal(); return; }
  if(t0.closest('#addWeight')){ weightModal(); return; }
  const inf=t0.closest('[data-info]'); if(inf){ infoModal(inf.dataset.info); return; }
  if(t0.closest('#editPet')){ petModal(activePet().info); return; }
  if(t0.closest('#delPet')){ if(confirm(`¿Eliminar a ${activePet().info.nombre} y todo su carné?`)){ data.pets=data.pets.filter(p=>p.info.id!==data.activeId); data.activeId=data.pets[0]?data.pets[0].info.id:null; save(); toast(t('deleted')); go('home'); } return; }
  const del=t0.closest('[data-del]'); if(del){ const pet=activePet(), id=del.dataset.id, k=del.dataset.del;
    if(k==='vacuna') pet.vaccines=pet.vaccines.filter(x=>x.id!==id);
    else if(k==='desparasitacion') pet.dewormings=pet.dewormings.filter(x=>x.id!==id);
    else if(k==='peso'){ pet.weights=pet.weights.filter(x=>x.id!==id); const l=pet.weights.slice().sort((a,b)=>a.fecha<b.fecha?1:-1)[0]; pet.info.peso=l?l.kg:pet.info.peso; }
    else if(k==='visita') pet.vetVisits=pet.vetVisits.filter(x=>x.id!==id);
    save(); toast(t('deleted')); render(); return; }
  if(t0.closest('#pvLock')){ lockModal(); return; }
  if(t0.closest('#pvEnc')){ encBackupModal(); return; }
  if(t0.closest('#pvWipe')){ wipeLocal(); return; }
  if(t0.closest('#pvDelAcc')){ deleteAccount(); return; }
  if(t0.closest('#fab')||t0.closest('[data-asst]')){ openAssistant(); return; }
  if(t0.closest('#ocrScan')){ ocrStart(); return; }
  if(t0.closest('#signIn')){ authModal(); return; }
  if(t0.closest('#syncNow')){ syncNow(); return; }
  if(t0.closest('#signOut')){ signOut(); return; }
  if(t0.closest('#installApp')){ doInstall(); return; }
  if(t0.closest('#notifTile')){ notifTileAction(); return; }
  if(t0.closest('#shareCard')){ shareModal(); return; }
  if(t0.closest('#expIcs')){ exportICS(); return; }
  if(t0.closest('#expPdf')){ exportPDF(); return; }
  if(t0.closest('#expCsv')){ exportCSV(); return; }
  if(t0.closest('#expJson')){ exportJSON(); return; }
  if(t0.closest('#impJson')){ importJSON(); return; }
});
document.addEventListener('change', e=>{ if(e.target.id==='remDays'){ data.remDays=Number(e.target.value); save(); toast(t('pref_saved')); } });

/* ======================================================================
   PWA — service worker, instalación (A2HS) y avisos locales
   ====================================================================== */
let installPrompt = null;   // evento beforeinstallprompt diferido

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
}
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); installPrompt = e;
  if(!shared && currentTab==='more') render();   // muestra el tile de instalar
});
window.addEventListener('appinstalled', ()=>{ installPrompt=null; toast(t('installed')); if(currentTab==='more') render(); });

async function doInstall(){
  if(!installPrompt) return;
  installPrompt.prompt();
  try{ await installPrompt.userChoice; }catch(_){}
  installPrompt=null; render();
}

// Avisos locales: pide permiso y, si hay VAPID, suscribe push (listo para Fase 4).
async function enableNotifs(){
  if(!('Notification' in window)){ toast(t('notif_unsupported')); return; }
  let perm = Notification.permission;
  if(perm==='default') perm = await Notification.requestPermission();
  if(perm==='granted'){ data.notifs=true; save(); trySubscribePush(); toast(t('notif_enabled')); }
  else { toast(t('notif_blocked')); }
  render();
}
async function trySubscribePush(){
  try{
    const cfg = window.VACUPET_AI || {};
    if(!cfg.vapidPublicKey || !('serviceWorker' in navigator)) return; // sin servidor todavía (Fase 4)
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8(cfg.vapidPublicKey) });
    const subJSON = sub.toJSON ? sub.toJSON() : sub;
    localStorage.setItem('vacupet:pushsub', JSON.stringify(subJSON));
    // Si hay sesión, registra la suscripción en Supabase (la usa la función vacupet-push).
    const c = await ensureSupabase();
    if(c && session){
      await c.from('push_subs').upsert({ endpoint: subJSON.endpoint, user_id: session.user.id, sub: subJSON, lang: data.lang||'es' });
    }
  }catch(e){ console.warn('push subscribe:', e); }
}
async function testNotif(){
  const pet = activePet(); const s = pet ? petSummary(pet) : null;
  const body = s && s.next ? `${s.next.nombre} · ${fmt(s.next.fecha)}` : t('notif_test_body');
  try{
    if('serviceWorker' in navigator){ const reg = await navigator.serviceWorker.ready; await reg.showNotification('VacuPet', { body, icon:'./icon.svg', badge:'./icon.svg', tag:'vacupet-test' }); }
    else new Notification('VacuPet', { body });
    toast(t('notif_test_sent'));
  }catch(e){ try{ new Notification('VacuPet', { body }); toast(t('notif_test_sent')); }catch(_){ console.warn(e); } }
}
function notifTileAction(){
  if(!('Notification' in window)){ toast(t('notif_unsupported')); return; }
  if(Notification.permission==='granted') testNotif();
  else if(Notification.permission==='denied') toast(t('notif_blocked'));
  else enableNotifs();
}
function urlB64ToUint8(b64){
  const pad='='.repeat((4 - b64.length % 4) % 4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

/* ---------------------------- Arranque ---------------------------- */
const hash0 = location.hash || '';
const tokenMatch = hash0.match(/^#s=([0-9a-fA-F-]{8,})/);   // carné compartido por token
shared = readShareHash();                                   // carné compartido en el hash (#v=)
let pendingAdd = null;

if(tokenMatch){
  // Vista de solo lectura cargada de forma asíncrona vía RPC.
  if(!data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
  loadSharedToken(tokenMatch[1]);
} else {
  if(!shared){
    // Accesos directos del manifest / enlaces: #tab=card, #add=vacuna
    const mTab = hash0.match(/[#&]tab=([a-z]+)/);  if(mTab && ['home','card','pet','more'].includes(mTab[1])) currentTab = mTab[1];
    const mAdd = hash0.match(/[#&]add=([a-z]+)/);   if(mAdd) pendingAdd = mAdd[1];
    if(mTab || mAdd) history.replaceState(null,'',location.pathname);
  }
  if(!shared && !data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
  render();
  // Bloqueo: si está activado, cubre la app hasta desbloquear.
  if(!shared && data.lock && data.lock.enabled) showLock();
  // Tras renderizar, abre el modal del acceso directo si procede y hay mascota.
  if(pendingAdd && data.pets.length){
    if(pendingAdd==='vacuna') vaccineModal();
    else if(pendingAdd==='desparasitacion') dewormModal();
  }
  // Nube: restaura sesión y sincroniza (si está configurada). No bloquea el arranque local.
  if(!shared && cloudConfigured()){
    ensureSupabase().then(c=>{ if(c && session) pullState(); }).catch(()=>{});
  }
}
