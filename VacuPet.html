  const all=allReminders();
  const notif = ('Notification' in window) && Notification.permission==='granted';
  const cloud = cloudConfigured() && !!session;
  const sched = supportsNotifTriggers();
  const KLABEL={ vacuna:t('ev_vacuna'), 'desparasitación':t('ev_desparasitacion'), cuidado:t('ev_cuidado'), 'medicación':t('ev_medicacion') };
  const ICON={ vacuna:I.syringe, 'desparasitación':I.bug, cuidado:I.heart, 'medicación':I.pill };
  const COL={ vencida:'c-red', proxima:'c-amber', futura:'c-green' };
  const grp=(key,status)=>{ const items=all.filter(r=>r.status===status); if(!items.length) return '';
    return `<div class="block-title" style="margin:14px 2px 6px">${t(key)} · ${items.length}</div><div class="card">${items.map(r=>
      `<div class="rec"><span class="ic ${COL[status]}">${ICON[r.kind]||I.bell}</span><div class="rr"><b>${esc(r.nombre)}</b><span>${esc(r.petName)} · ${esc(KLABEL[r.kind]||r.kind)} · ${fmt(r.fecha)}</span></div><div class="meta">${dueTagFor(r.fecha)}</div></div>`).join('')}</div>`; };
  const statusCard = `<div class="card pad" style="display:grid;gap:8px">
    <div style="display:flex;align-items:center;gap:9px"><span class="ic ${notif?'c-green':'c-muted'}" style="width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none">${I.bell}</span><span style="font-size:13px">${notif?t('rc_channel_local'):t('rc_channel_off')}</span></div>
    ${cloud?`<div style="display:flex;align-items:center;gap:9px"><span class="ic c-blue" style="width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none">${I.shield}</span><span style="font-size:13px">${t('rc_channel_cloud')}</span></div>`:''}
    <div class="hint">${sched?t('rc_sched_on'):t('rc_sched_off')}</div></div>`;
  const body = all.length
    ? statusCard + grp('grp_overdue','vencida') + grp('grp_soon','proxima') + grp('grp_future','futura')
    : statusCard + emptyBox(I.bell, t('rc_empty'));
  const foot = notif
    ? `<button class="btn btn-block" data-close>${t('close')}</button>`
    : `<button class="btn btn-primary" style="flex:1" id="rcEnable">${t('rc_enable')}</button><button class="btn" data-close style="flex:none">${t('close')}</button>`;
  openModal(modalShell(t('rc_title'), body, foot));
  const en=document.getElementById('rcEnable'); if(en) en.onclick=()=>enableNotifs();
}
function urlB64ToUint8(b64){
  const pad='='.repeat((4 - b64.length % 4) % 4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

/* ---------------------------- Arranque ---------------------------- */
const hash0 = location.hash || '';
const tokenMatch = hash0.match(/^#s=([0-9a-fA-F-]{8,})/);   // carné compartido por token
shared = readShareHash();                                   // carné compartido en el hash (#v=)
let pendingAdd = null;

if(tokenMatch){
  // Vista de solo lectura cargada de forma asíncrona vía RPC.
  if(!data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
  loadSharedToken(tokenMatch[1]);
} else {
  if(!shared){
    // Accesos directos del manifest / enlaces: #tab=card, #add=vacuna
    const mTab = hash0.match(/[#&]tab=([a-z]+)/);  if(mTab && ['home','card','pet','more'].includes(mTab[1])) currentTab = mTab[1];
    const mAdd = hash0.match(/[#&]add=([a-z]+)/);   if(mAdd) pendingAdd = mAdd[1];
    if(mTab || mAdd) history.replaceState(null,'',location.pathname);
  }
  if(!shared && !data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
  render();
  // Enlace #demo: crea una mascota de ejemplo si aún no hay ninguna.
  if(!shared && /[#&]demo/.test(hash0) && data.pets.length===0){ history.replaceState(null,'',location.pathname); loadDemoPet(); }
  // Bloqueo: si está activado, cubre la app hasta desbloquear.
  if(!shared && data.lock && data.lock.enabled) showLock();
  // Tras renderizar, abre el modal del acceso directo si procede y hay mascota.
  if(pendingAdd && data.pets.length){
    if(pendingAdd==='vacuna') vaccineModal();
    else if(pendingAdd==='desparasitacion') dewormModal();
  }
  // Nube: restaura sesión y sincroniza (si está configurada). No bloquea el arranque local.
  if(!shared && cloudConfigured()){
    ensureSupabase().then(c=>{ if(c && session) pullState(); }).catch(()=>{});
  }
  // Reprograma avisos locales (best-effort) si ya hay permiso concedido.
  if(!shared && ('Notification' in window) && Notification.permission==='granted') scheduleLocalNotifs();
}
