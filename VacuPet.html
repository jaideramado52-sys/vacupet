<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16A34A">
<meta name="description" content="Carné de salud digital para tu mascota: vacunas, desparasitación y recordatorios.">
<title>VacuPet — Carné de salud para mascotas</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<script src="./supabase-config.js" defer></script>
<style>
/* ============================ Sistema de diseño ============================ */
:root{
  --bg:#F4F8F4; --surface:#FFFFFF; --surface-2:#FAFCFA; --ink:#10291A; --muted:#5B6B60;
  --accent:#16A34A; --accent-ink:#0B6B33; --line:#E3ECE5; --line-2:#EEF3EF;
  --green:#16A34A; --amber:#D97706; --red:#DC2626; --blue:#2563EB;
  --radius:16px; --radius-sm:11px; --shadow:0 1px 2px rgba(16,41,26,.05),0 1px 3px rgba(16,41,26,.04);
  --shadow-lg:0 10px 30px rgba(16,41,26,.14);
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,system-ui,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0B130E; --surface:#121C15; --surface-2:#16221A; --ink:#EAF2EC; --muted:#9FB3A6;
    --accent:#22C55E; --accent-ink:#86EFAC; --line:#1E2A22; --line-2:#1A251E;
    --shadow:0 1px 2px rgba(0,0,0,.3); --shadow-lg:0 12px 34px rgba(0,0,0,.5);
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;
  -webkit-font-smoothing:antialiased;min-height:100dvh;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent-ink)}
.hide{display:none !important}

/* ---- Header ---- */
header.app{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;
  padding:14px 16px calc(14px) 16px;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line-2);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em;font-size:18px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff}
.brand .logo svg{width:19px;height:19px}
.header-spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--surface);
  display:grid;place-items:center;color:var(--ink);box-shadow:var(--shadow)}
.iconbtn svg{width:18px;height:18px}

/* ---- Layout ---- */
main{max-width:620px;margin:0 auto;padding:16px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
section.block{margin:22px 0 0}
.block-title{font-size:13px;font-weight:650;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 2px 10px}

/* ---- Cards ---- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.tile{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);width:100%;text-align:left;color:inherit}
.tile:active{transform:scale(.99)}
.tile .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
.tile .ic svg{width:19px;height:19px}
.tile .tt{flex:1;min-width:0}
.tile .tt b{display:block;font-size:15px}
.tile .tt span{font-size:13px;color:var(--muted)}
.tile .chev{color:var(--muted);flex:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* ---- Color por categoría (suave) ---- */
.c-green{background:color-mix(in srgb,var(--green) 13%,var(--surface));color:var(--green)}
.c-amber{background:color-mix(in srgb,var(--amber) 14%,var(--surface));color:var(--amber)}
.c-red{background:color-mix(in srgb,var(--red) 13%,var(--surface));color:var(--red)}
.c-blue{background:color-mix(in srgb,var(--blue) 13%,var(--surface));color:var(--blue)}
.c-accent{background:color-mix(in srgb,var(--accent) 14%,var(--surface));color:var(--accent)}

/* ---- Hero / estado del día ---- */
.hero{padding:18px;display:flex;gap:16px;align-items:center}
.hero .ring-wrap{flex:none}
.hero h2{font-size:19px}
.hero .sub{color:var(--muted);font-size:14px;margin-top:2px}
.statepill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:650;padding:3px 10px;border-radius:999px;margin-top:8px}
.statepill .dot{width:7px;height:7px;border-radius:50%}

/* ---- Chips resumen ---- */
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:14px}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center;box-shadow:var(--shadow)}
.chip .n{font-size:20px;font-weight:720;letter-spacing:-.02em}
.chip .l{font-size:11px;color:var(--muted);margin-top:1px}

/* ---- Banner próxima ---- */
.banner{display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:var(--radius);margin-top:14px;border:1px solid var(--line)}
.banner .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none}
.banner .ic svg{width:20px;height:20px}
.banner .bb{flex:1;min-width:0}
.banner .bb b{display:block;font-size:14.5px}
.banner .bb span{font-size:12.5px;color:var(--muted)}

/* ---- Carrusel mascotas ---- */
.pets-row{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 6px;scrollbar-width:none}
.pets-row::-webkit-scrollbar{display:none}
.petav{flex:none;width:74px;text-align:center}
.petav .av{width:62px;height:62px;border-radius:50%;margin:0 auto;position:relative;display:grid;place-items:center;
  background:var(--surface-2);border:1px solid var(--line);overflow:hidden;font-size:26px}
.petav .av img{width:100%;height:100%;object-fit:cover}
.petav.active .av{outline:2.5px solid var(--accent);outline-offset:2px}
.petav .nm{font-size:12px;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.petav .ringmini{position:absolute;inset:-4px}
.addpet .av{border-style:dashed;color:var(--muted)}

/* ---- Lista de registros ---- */
.rec{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid var(--line-2)}
.rec:last-child{border-bottom:0}
.rec .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}
.rec .ic svg{width:18px;height:18px}
.rec .rr{flex:1;min-width:0}
.rec .rr b{font-size:14.5px;display:block}
.rec .rr span{font-size:12.5px;color:var(--muted)}
.rec .meta{text-align:right;font-size:12px;flex:none}
.tagdue{display:inline-block;font-size:11px;font-weight:650;padding:2px 8px;border-radius:999px}
.rec .del{color:var(--muted);background:none;border:0;padding:6px;border-radius:8px}
.rec .del svg{width:16px;height:16px;display:block}
.empty{text-align:center;color:var(--muted);padding:40px 20px}
.empty svg{width:42px;height:42px;opacity:.4;margin-bottom:10px}

/* ---- Botones ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:46px;padding:0 18px;border-radius:13px;
  border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:15px;box-shadow:var(--shadow)}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--accent);border-color:transparent;color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 40%,transparent)}
.btn-block{width:100%}
.btn-ghost{background:transparent;border-color:transparent;box-shadow:none;color:var(--accent-ink)}
.btn-danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 30%,var(--line))}
.row-actions{display:flex;gap:10px;margin-top:14px}

/* ---- Formularios ---- */
.field{margin-top:13px}
.field label{display:block;font-size:13px;font-weight:600;margin:0 0 6px 2px;color:var(--ink)}
.field .hint{font-size:12px;color:var(--muted);margin-top:5px}
input,select,textarea{
  width:100%;height:46px;padding:0 13px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface-2);color:var(--ink);font-size:15px;font-family:inherit;outline:none
}
textarea{height:auto;padding:11px 13px;min-height:64px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
.field.err input,.field.err select{border-color:var(--red)}
.field .errmsg{color:var(--red);font-size:12px;margin-top:5px;display:none}
.field.err .errmsg{display:block}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.seg{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px}
.seg button{flex:1;height:38px;border:0;border-radius:9px;background:transparent;color:var(--muted);font-weight:600;font-size:14px}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* ---- Tabbar ---- */
nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:saturate(160%) blur(14px);border-top:1px solid var(--line-2)}
nav.tabbar button{flex:1;max-width:120px;border:0;background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;font-size:11px;font-weight:600}
nav.tabbar button svg{width:23px;height:23px}
nav.tabbar button.on{color:var(--accent)}

/* ---- Modal ---- */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(8,18,12,.5);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);width:100%;max-width:620px;max-height:92dvh;overflow-y:auto;
  border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);animation:up .28s cubic-bezier(.2,.8,.2,1)}
@media(min-width:640px){.scrim{align-items:center}.modal{border-radius:22px}}
@keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.modal-head{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line-2);z-index:1}
.modal-head h3{flex:1;font-size:17px}
.modal-head .x{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);display:grid;place-items:center;color:var(--muted)}
.modal-body{padding:16px 18px 22px}
.modal-foot{position:sticky;bottom:0;background:var(--surface);padding:12px 18px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line-2);display:flex;gap:10px}

/* ---- Toast ---- */
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Foto upload ---- */
.photo-pick{display:flex;align-items:center;gap:14px}
.photo-pick .pv{width:64px;height:64px;border-radius:16px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;display:grid;place-items:center;font-size:28px;flex:none}
.photo-pick .pv img{width:100%;height:100%;object-fit:cover}

/* ---- Disclaimer ---- */
.disclaimer{font-size:12px;color:var(--muted);text-align:center;padding:24px 16px 8px;line-height:1.6}

/* ---- Área de impresión (PDF) ---- */
#printArea{display:none}
@media print{
  body{padding:0;background:#fff;color:#000}
  header.app,nav.tabbar,main,.toast,.scrim{display:none !important}
  #printArea{display:block;padding:24px;font-family:var(--font);color:#000}
  #printArea h1{font-size:22px;margin-bottom:2px}
  #printArea table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12px}
  #printArea th,#printArea td{border:1px solid #ccc;padding:6px 8px;text-align:left}
  #printArea th{background:#f2f2f2}
  #printArea h3{margin:18px 0 4px;font-size:14px}
}
</style>
</head>
<body>

<!-- ============================ Header ============================ -->
<header class="app">
  <div class="brand">
    <span class="logo" id="brandLogo"></span> VacuPet
  </div>
  <div class="header-spacer"></div>
  <button class="iconbtn" id="btnBackup" title="Respaldo" aria-label="Respaldo y ajustes"></button>
</header>

<main id="app"></main>

<!-- ============================ Tabbar ============================ -->
<nav class="tabbar" id="tabbar"></nav>

<!-- Modales y toast se inyectan aquí -->
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<div id="printArea"></div>

<!-- inputs ocultos -->
<input type="file" id="photoInput" accept="image/*" class="hide">
<input type="file" id="importInput" accept="application/json,.json" class="hide">

<script>
"use strict";
/* ======================================================================
   VacuPet — Fase 0 (MVP personal, offline). Todo en localStorage.
   Modelo: vacupet:data:v1
   ====================================================================== */

/* ---------------------------- Iconos SVG ---------------------------- */
const I = {
  paw:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="10" r="2.1"/><circle cx="10.5" cy="6.5" r="2.1"/><circle cx="15.5" cy="6.5" r="2.1"/><circle cx="19" cy="10.5" r="2"/><path d="M12.5 11c-2.4 0-4.3 1.7-5.2 3.4-.9 1.7-1.6 3.6.2 4.6 1.2.7 2.6-.2 4-.2s2.8.9 4 .2c1.8-1 .9-2.9 0-4.6C14.8 12.7 14.9 11 12.5 11z"/></svg>',
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg>',
  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 9.5h18M7 14h5"/></svg>',
  pet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.6 3.6-6 8-6s8 2.4 8 6"/></svg>',
  more:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>',
  syringe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m18 2 4 4M20 4l-7 7M13 11l-7 7-3 1 1-3 7-7M14 8l2 2M11 11l2 2"/></svg>',
  bug:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="7" width="8" height="12" rx="4"/><path d="M12 7V4M9 9 6 7M15 9l3-2M8 12H4M20 12h-4M9 16l-3 2M15 16l3 2"/></svg>',
  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5 9-10"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>',
  pdf:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6v18h12V7z"/><path d="M14 3v4h4M8 13h8M8 17h5"/></svg>',
  download:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>',
  upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9m0 0 4 4m-4-4-4 4M5 3h14"/></svg>',
};
const SPECIES_EMOJI = { perro:'🐶', gato:'🐱', conejo:'🐰', huron:'🦦', ave:'🐦', otro:'🐾' };

/* ---------------------------- Esquema vacunal (orientativo) ---------------------------- */
// tipo:'serie' => en cachorros refuerza por intervalo corto; si adulto, refuerzo anual.
const SCHEME = {
  perro:{
    'Polivalente (quíntuple/séxtuple)':{tipo:'serie',intervaloDias:21,refuerzoMeses:12},
    'Rabia':{refuerzoMeses:12},
    'Leptospirosis':{refuerzoMeses:12},
    'Bordetella (tos de las perreras)':{refuerzoMeses:12},
  },
  gato:{
    'Trivalente felina (FVRCP)':{tipo:'serie',intervaloDias:21,refuerzoMeses:12},
    'Rabia':{refuerzoMeses:12},
    'Leucemia felina (FeLV)':{refuerzoMeses:12},
  },
  otro:{ 'Rabia':{refuerzoMeses:12} }
};
function vaccineOptions(especie){
  const base = SCHEME[especie] ? Object.keys(SCHEME[especie]) : Object.keys(SCHEME.otro);
  return base;
}

/* ---------------------------- Estado / persistencia ---------------------------- */
const KEY = 'vacupet:data:v1';
let data = load();

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ const d = JSON.parse(raw); return migrate(d); }
  }catch(e){ console.warn('No se pudo leer el estado:', e); }
  return { v:1, activeId:null, remDays:30, pets:[] };
}
function migrate(d){
  // Punto de extensión para futuras versiones del modelo.
  if(!d.v) d.v = 1;
  if(!Array.isArray(d.pets)) d.pets = [];
  if(typeof d.remDays !== 'number') d.remDays = 30;
  d.pets.forEach(p=>{
    p.vaccines = p.vaccines || [];
    p.dewormings = p.dewormings || [];
    p.weights = p.weights || [];     // reservados para Fase 1
    p.vetVisits = p.vetVisits || [];
  });
  return d;
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(data)); }
  catch(e){ toast('No se pudo guardar (almacenamiento lleno).'); console.error(e); }
}
function activePet(){ return data.pets.find(p=>p.info.id===data.activeId) || data.pets[0] || null; }

/* ---------------------------- Utilidades ---------------------------- */
let _seq = 0;
function uid(){ _seq++; return 'p'+Date.now().toString(36)+_seq.toString(36); }
function todayISO(){ const d=new Date(); d.setHours(0,0,0,0); return toISO(d); }
function toISO(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${da}`; }
function parseISO(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return dt; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
function monthsBetween(a,b){ return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()); }
function fmt(s){ const d=parseISO(s); if(!d) return '—'; return d.toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'}); }
function ageText(nac){
  if(!nac) return '';
  const m = monthsBetween(parseISO(nac), new Date());
  if(m<0) return '';
  if(m<12) return `${m} mes${m===1?'':'es'}`;
  const y=Math.floor(m/12), r=m%12;
  return `${y} año${y===1?'':'s'}${r?` ${r}m`:''}`;
}
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------------------------- Esquema: sugerir próxima ---------------------------- */
function suggestProxima(especie, nombre, fechaISO, nacimientoISO){
  const sp = SCHEME[especie] || SCHEME.otro;
  const rule = sp[nombre];
  if(!rule || !fechaISO) return '';
  const base = parseISO(fechaISO);
  let ageMonths = nacimientoISO ? monthsBetween(parseISO(nacimientoISO), base) : null;
  if(rule.tipo==='serie' && ageMonths!=null && ageMonths < 4) return toISO(addDays(base, rule.intervaloDias));
  if(rule.refuerzoMeses) return toISO(addMonths(base, rule.refuerzoMeses));
  return '';
}
function suggestDeworm(tipo, fechaISO){
  if(!fechaISO) return '';
  const base = parseISO(fechaISO);
  return tipo==='externa' ? toISO(addMonths(base,1)) : toISO(addMonths(base,3));
}

/* ---------------------------- Recordatorios ---------------------------- */
function reminders(pet){
  const out=[];
  (pet.vaccines||[]).forEach(v=>{ if(v.proxima) out.push({kind:'vacuna',nombre:v.nombre,fecha:v.proxima,id:v.id}); });
  (pet.dewormings||[]).forEach(d=>{ if(d.proxima) out.push({kind:'desparasitación',nombre:d.producto||(d.tipo==='externa'?'Antipulgas':'Interna'),fecha:d.proxima,id:d.id}); });
  out.sort((a,b)=>a.fecha<b.fecha?-1:1);
  return out;
}
function statusOf(fecha){
  const t=todayISO();
  if(fecha<t) return 'vencida';
  if(daysBetween(t,fecha)<=data.remDays) return 'proxima';
  return 'futura';
}
function petSummary(pet){
  const rem = reminders(pet);
  const aplicadas = (pet.vaccines||[]).length + (pet.dewormings||[]).length;
  let vencidas=0, proximas=0, next=null;
  rem.forEach(r=>{ const s=statusOf(r.fecha); if(s==='vencida') vencidas++; else if(s==='proxima') proximas++; if(r.fecha>=todayISO()&&!next) next=r; });
  let estado='aldia';
  if(vencidas>0) estado='vencidas'; else if(proximas>0) estado='proximas';
  const handled = aplicadas, pending = vencidas+proximas;
  const pct = (handled+pending)===0 ? 0 : Math.round(handled/(handled+pending)*100);
  return {aplicadas,vencidas,proximas,next,estado,pct,rem};
}

/* ---------------------------- Render: anillo de progreso ---------------------------- */
function ringSVG(pct, color, size=58, sw=6){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 ${size/2} ${size/2})"/></svg>`;
}

  aldia:{label:'Al día',color:'var(--green)',dot:'var(--green)'},
  proximas:{label:'Dosis próximas',color:'var(--amber)',dot:'var(--amber)'},

};

/* ---- Carné (historial) ---- */
function viewCard(){
  const pet = activePet();
  const vac = (pet.vaccines||[]).slice().sort((a,b)=>(b.fecha||'')<(a.fecha||'')?-1:1);
  const dew = (pet.dewormings||[]).slice().sort((a,b)=>(b.fecha||'')<(a.fecha||'')?-1:1);

  const recRow = (item, kind)=>{
    const dueTag = item.proxima ? (()=> {
      const st = statusOf(item.proxima);
      const cls = st==='vencida'?'c-red':st==='proxima'?'c-amber':'c-green';
      const txt = st==='vencida'?'Vencida':st==='proxima'?`En ${daysBetween(todayISO(),item.proxima)}d`:'Próxima';
      return `<span class="tagdue ${cls}">${txt}</span>`;
    })() : '';
    const title = kind==='vacuna' ? item.nombre : (item.producto || (item.tipo==='externa'?'Externa (antipulgas)':'Interna'));
    const sub = kind==='vacuna'
      ? [fmt(item.fecha), item.dosis&&`dosis ${esc(item.dosis)}`, item.lugar].filter(Boolean).join(' · ')
      : [fmt(item.fecha), item.tipo==='externa'?'externa':'interna', item.producto&&kind!=='vacuna'?'' :''].filter(Boolean).join(' · ');
    return `<div class="rec">
      <span class="ic ${kind==='vacuna'?'c-accent':'c-blue'}">${kind==='vacuna'?I.syringe:I.bug}</span>
      <div class="rr"><b>${esc(title)}</b><span>${esc(sub)}${item.proxima?` · próxima ${fmt(item.proxima)}`:''}</span></div>
      <div class="meta">${dueTag}</div>
      <button class="del" data-del="${kind}" data-id="${item.id}" aria-label="Eliminar">${I.trash}</button>
    </div>`;
  };

  const vacBlock = vac.length
    ? `<div class="card">${vac.map(v=>recRow(v,'vacuna')).join('')}</div>`
    : `<div class="card pad empty">${I.syringe}<div>Sin vacunas registradas</div></div>`;
  const dewBlock = dew.length
    ? `<div class="card">${dew.map(d=>recRow(d,'desparasitacion')).join('')}</div>`
    : `<div class="card pad empty">${I.bug}<div>Sin desparasitaciones</div></div>`;

  return `<div class="view">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <h1 style="font-size:22px;flex:1">Carné de ${esc(pet.info.nombre)}</h1>
    </div>
    <section class="block" style="margin-top:14px">
      <div class="block-title">Vacunas</div>
      ${vacBlock}
      <button class="btn btn-block" data-add="vacuna" style="margin-top:11px">${I.plus} Añadir vacuna</button>
    </section>
    <section class="block">
      <div class="block-title">Desparasitación</div>
      ${dewBlock}
      <button class="btn btn-block" data-add="desparasitacion" style="margin-top:11px">${I.plus} Añadir desparasitación</button>
    </section>
    <p class="disclaimer">El esquema y las fechas “próxima” son orientativos. Confírmalos con tu veterinario.</p>
  </div>`;
}

      peso:val('m-peso'), microchip:val('m-chip').trim(),
      esterilizado: esterVal==='si'?true:esterVal==='no'?false:null,
      veterinario:val('m-vet').trim(), notas:val('m-notas').trim(), foto:photoTmp||null,
    };
    if(existing){
      const pet = data.pets.find(x=>x.info.id===existing.id); pet.info=info;
    }else{
      data.pets.push({info, vaccines:[], dewormings:[], weights:[], vetVisits:[]});
      data.activeId = info.id;
    }
    save(); closeModal(); toast('Mascota guardada'); go('home');
  });
}

/* ---- Modal vacuna ---- */
function vaccineModal(){
  const pet = activePet();
  const opts = vaccineOptions(pet.info.especie);
  const body = `
    <div class="field" id="f-vnombre"><label>Vacuna *</label>
      <input list="vacList" id="v-nombre" placeholder="Selecciona o escribe">
      <datalist id="vacList">${opts.map(o=>`<option value="${esc(o)}">`).join('')}</datalist>
      <div class="errmsg">Indica la vacuna</div>
    </div>
    <div class="two">
      <div class="field" id="f-vfecha"><label>Fecha de aplicación *</label><input type="date" id="v-fecha" value="${todayISO()}" max="${todayISO()}"><div class="errmsg">Fecha requerida</div></div>
      <div class="field"><label>Dosis</label><input id="v-dosis" placeholder="1.ª, 2.ª, refuerzo"></div>
    </div>
    <div class="field"><label>Próxima dosis (orientativa)</label><input type="date" id="v-proxima"><div class="hint" id="v-sug"></div></div>
    <div class="two">
      <div class="field"><label>Marca</label><input id="v-marca" placeholder="Laboratorio"></div>
      <div class="field"><label>Lote</label><input id="v-lote"></div>
    </div>
    <div class="two">
      <div class="field"><label>Lugar</label><input id="v-lugar" placeholder="Clínica"></div>
      <div class="field"><label>Vía</label><select id="v-via"><option value="">—</option><option>Subcutánea</option><option>Intramuscular</option><option>Intranasal</option><option>Oral</option></select></div>
    </div>
    <div class="field"><label>Aplicada por</label><input id="v-por" placeholder="Veterinario/a"></div>
    <div class="field"><label>Notas</label><textarea id="v-notas"></textarea></div>
  `;
  const footer = `<button class="btn btn-ghost" data-close style="flex:none">Cancelar</button>
    <button class="btn btn-primary btn-block" id="saveVac">Guardar vacuna</button>`;
  openModal(modalShell('Registrar vacuna', body, footer));

  function refreshSuggestion(){
    const nombre=val('v-nombre'), fecha=val('v-fecha');
    const sug = suggestProxima(pet.info.especie, nombre, fecha, pet.info.nacimiento);
    if(sug){
      document.getElementById('v-sug').textContent = `Sugerencia del esquema: ${fmt(sug)} (puedes cambiarla)`;
      if(!document.getElementById('v-proxima').value) document.getElementById('v-proxima').value = sug;
    } else { document.getElementById('v-sug').textContent = 'Selecciona una vacuna del esquema para sugerir la próxima.'; }
  }
  document.getElementById('v-nombre').addEventListener('change', refreshSuggestion);
  document.getElementById('v-nombre').addEventListener('input', refreshSuggestion);
  document.getElementById('v-fecha').addEventListener('change', ()=>{ document.getElementById('v-proxima').value=''; refreshSuggestion(); });
  refreshSuggestion();

  document.getElementById('saveVac').addEventListener('click', ()=>{
    let ok=true;
    const nombre=val('v-nombre').trim(), fecha=val('v-fecha');
    if(!nombre){ document.getElementById('f-vnombre').classList.add('err'); ok=false; }
    if(!fecha){ document.getElementById('f-vfecha').classList.add('err'); ok=false; }
    if(!ok) return;
    pet.vaccines.push({
      id:uid(), nombre, fecha, dosis:val('v-dosis').trim(), proxima:val('v-proxima'),
      marca:val('v-marca').trim(), lote:val('v-lote').trim(), lugar:val('v-lugar').trim(),
      via:val('v-via'), aplicada_por:val('v-por').trim(), notas:val('v-notas').trim(), source:'manual'
    });
    save(); closeModal(); toast('Vacuna registrada'); render();
  });
}

/* ---- Modal desparasitación ---- */
function dewormModal(){
  const pet = activePet();
  let tipo='interna';
  const body = `
    <div class="field"><label>Tipo</label>
      <div class="seg" id="d-tipo">
        <button type="button" data-v="interna" class="on">Interna</button>
        <button type="button" data-v="externa">Externa (antipulgas)</button>
      </div>
    </div>
    <div class="field"><label>Producto</label><input id="d-prod" placeholder="Nombre del antiparasitario"></div>
    <div class="two">
      <div class="field" id="f-dfecha"><label>Fecha *</label><input type="date" id="d-fecha" value="${todayISO()}" max="${todayISO()}"><div class="errmsg">Fecha requerida</div></div>
      <div class="field"><label>Peso (kg)</label><input type="number" step="0.1" min="0" id="d-peso" value="${esc(pet.info.peso||'')}"></div>
    </div>
    <div class="field"><label>Próxima (orientativa)</label><input type="date" id="d-proxima"><div class="hint" id="d-sug"></div></div>
    <div class="field"><label>Notas</label><textarea id="d-notas"></textarea></div>
  `;
  const footer = `<button class="btn btn-ghost" data-close style="flex:none">Cancelar</button>
    <button class="btn btn-primary btn-block" id="saveDew">Guardar</button>`;
  openModal(modalShell('Registrar desparasitación', body, footer));

  function refreshSug(){
    const sug = suggestDeworm(tipo, val('d-fecha'));
    document.getElementById('d-sug').textContent = sug?`Sugerencia: ${fmt(sug)} (${tipo==='externa'?'mensual':'cada 3 meses'})`:'';
    if(sug && !document.getElementById('d-proxima').value) document.getElementById('d-proxima').value=sug;
  }
  document.getElementById('d-tipo').addEventListener('click', e=>{
    const b=e.target.closest('button'); if(!b) return; tipo=b.dataset.v;
    [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));
    document.getElementById('d-proxima').value=''; refreshSug();
  });
  document.getElementById('d-fecha').addEventListener('change', ()=>{ document.getElementById('d-proxima').value=''; refreshSug(); });
  refreshSug();

  document.getElementById('saveDew').addEventListener('click', ()=>{
    const fecha=val('d-fecha');
    if(!fecha){ document.getElementById('f-dfecha').classList.add('err'); return; }
    pet.dewormings.push({ id:uid(), tipo, producto:val('d-prod').trim(), fecha, peso:val('d-peso'), proxima:val('d-proxima'), notas:val('d-notas').trim() });
    save(); closeModal(); toast('Desparasitación registrada'); render();
  });
}

/* ---- Selector de mascota ---- */
function switchModal(){
  const body = data.pets.map(p=>{
    const av=p.info.foto?`<img src="${p.info.foto}" style="width:100%;height:100%;object-fit:cover">`:(SPECIES_EMOJI[p.info.especie]||'🐾');
    return `<button class="tile" data-switch="${p.info.id}" style="margin-bottom:10px">
      <span class="ic" style="background:var(--surface-2);overflow:hidden">${av}</span>
      <span class="tt"><b>${esc(p.info.nombre)}</b><span>${esc(cap(p.info.especie))}${p.info.raza?` · ${esc(p.info.raza)}`:''}</span></span>
      ${p.info.id===data.activeId?`<span style="color:var(--accent)">${I.check}</span>`:`<span class="chev">${I.chev}</span>`}
    </button>`;
  }).join('');
  openModal(modalShell('Cambiar de mascota', body, `<button class="btn btn-block" data-close>Cerrar</button>`));
}

/* ======================================================================
   Foto: compresión a dataURL
   ====================================================================== */
function compressImage(file, cb){
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      const max=512, scale=Math.min(1, max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.78));
    };
    img.onerror=()=>toast('No se pudo leer la imagen');
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ======================================================================
   Exportaciones
   ====================================================================== */
function exportICS(){
  const pet=activePet(); const rems=reminders(pet).filter(r=>r.fecha>=todayISO());
  if(!rems.length){ toast('No hay próximas fechas que exportar'); return; }
  const pad=n=>String(n).padStart(2,'0');
  const fmtICS=s=>{ const d=parseISO(s); return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`; };
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//VacuPet//ES\r\nCALSCALE:GREGORIAN\r\n';
  rems.forEach((r,i)=>{
    ics+=`BEGIN:VEVENT\r\nUID:vacupet-${pet.info.id}-${i}@local\r\nDTSTART;VALUE=DATE:${fmtICS(r.fecha)}\r\n`+
      `SUMMARY:${pet.info.nombre}: ${r.kind} — ${r.nombre}\r\nDESCRIPTION:Recordatorio de VacuPet (orientativo)\r\nEND:VEVENT\r\n`;
  });
  ics+='END:VCALENDAR\r\n';
  download(`vacupet-${slug(pet.info.nombre)}.ics`, ics, 'text/calendar');
  toast('Calendario exportado');
}

function exportPDF(){
  const pet=activePet(); const info=pet.info;
  const vac=(pet.vaccines||[]).slice().sort((a,b)=>(a.fecha||'')<(b.fecha||'')?-1:1);
  const dew=(pet.dewormings||[]).slice().sort((a,b)=>(a.fecha||'')<(b.fecha||'')?-1:1);
  const rowV=v=>`<tr><td>${esc(v.nombre)}</td><td>${fmt(v.fecha)}</td><td>${esc(v.dosis||'')}</td><td>${esc(v.lote||'')}</td><td>${esc(v.marca||'')}</td><td>${v.proxima?fmt(v.proxima):''}</td></tr>`;
  const rowD=d=>`<tr><td>${esc(d.producto||(d.tipo==='externa'?'Externa':'Interna'))}</td><td>${d.tipo==='externa'?'Externa':'Interna'}</td><td>${fmt(d.fecha)}</td><td>${d.peso?d.peso+' kg':''}</td><td>${d.proxima?fmt(d.proxima):''}</td></tr>`;
  document.getElementById('printArea').innerHTML = `
    <h1>🐾 Carné de salud — ${esc(info.nombre)}</h1>
    <div>${esc(cap(info.especie))}${info.raza?` · ${esc(info.raza)}`:''}${info.sexo?` · ${info.sexo==='h'?'Hembra':'Macho'}`:''}${info.nacimiento?` · Nac. ${fmt(info.nacimiento)} (${ageText(info.nacimiento)})`:''}</div>
    <div>${info.microchip?`Microchip: ${esc(info.microchip)} · `:''}${info.esterilizado===true?'Esterilizado/a · ':''}${info.veterinario?`Vet: ${esc(info.veterinario)}`:''}</div>
    <h3>Vacunas</h3>
    ${vac.length?`<table><thead><tr><th>Vacuna</th><th>Fecha</th><th>Dosis</th><th>Lote</th><th>Marca</th><th>Próxima</th></tr></thead><tbody>${vac.map(rowV).join('')}</tbody></table>`:'<div>Sin registros</div>'}
    <h3>Desparasitación</h3>
    ${dew.length?`<table><thead><tr><th>Producto</th><th>Tipo</th><th>Fecha</th><th>Peso</th><th>Próxima</th></tr></thead><tbody>${dew.map(rowD).join('')}</tbody></table>`:'<div>Sin registros</div>'}
    <p style="margin-top:18px;font-size:11px;color:#666">Generado por VacuPet · ${fmt(todayISO())}. Documento orientativo; no reemplaza el carné oficial ni la consulta veterinaria.</p>`;
  setTimeout(()=>window.print(), 60);
}

function exportJSON(){
  download(`vacupet-respaldo-${todayISO()}.json`, JSON.stringify(data,null,2), 'application/json');
  toast('Respaldo descargado');
}
function importJSON(){
  const inp=document.getElementById('importInput'); inp.value='';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(!d || !Array.isArray(d.pets)) throw new Error('Formato no válido');
      if(!confirm('Esto reemplazará tus datos actuales por los del respaldo. ¿Continuar?')) return;
      data=migrate(d); if(!data.activeId&&data.pets[0]) data.activeId=data.pets[0].info.id;
      save(); toast('Respaldo restaurado'); go('home');
    }catch(err){ toast('Archivo inválido'); console.error(err); } };
    r.readAsText(f);
  };
  inp.click();
}

function download(name, content, type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function slug(s){ return String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'mascota'; }

/* ======================================================================
   Helpers de UI + toast
   ====================================================================== */
function val(id){ const el=document.getElementById(id); return el?el.value:''; }
let toastT=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

/* ======================================================================
   Delegación de eventos (un solo listener global)
   ====================================================================== */
document.addEventListener('click', e=>{
  const t=e.target;
  // cerrar modal
  if(t.closest('[data-close]')){ closeModal(); return; }
  // tabbar
  const tab=t.closest('[data-tab]'); if(tab){ go(tab.dataset.tab); return; }
  const goEl=t.closest('[data-go]'); if(goEl){ go(goEl.dataset.go); return; }
  // header backup -> más
  if(t.closest('#btnBackup')){ go('more'); return; }
  // onboarding / añadir mascota
  if(t.closest('#onbAdd')||t.closest('#addPet')){ petModal(null); return; }
  // seleccionar mascota (carrusel)
  const pa=t.closest('[data-pet]'); if(pa){ data.activeId=pa.dataset.pet; save(); render(); return; }
  const sw=t.closest('[data-switch]'); if(sw){ data.activeId=sw.dataset.switch; save(); closeModal(); go('home'); return; }
  if(t.closest('#switchPet')){ switchModal(); return; }
  // registrar
  const add=t.closest('[data-add]'); if(add){ add.dataset.add==='vacuna'?vaccineModal():dewormModal(); return; }
  // editar / borrar mascota
  if(t.closest('#editPet')){ petModal(activePet().info); return; }
  if(t.closest('#delPet')){
    if(confirm(`¿Eliminar a ${activePet().info.nombre} y todo su carné?`)){
      data.pets=data.pets.filter(p=>p.info.id!==data.activeId);
      data.activeId=data.pets[0]?data.pets[0].info.id:null; save(); toast('Mascota eliminada'); go('home');
    } return;
  }
  // borrar registro
  const del=t.closest('[data-del]'); if(del){
    const pet=activePet(), id=del.dataset.id;
    if(del.dataset.del==='vacuna') pet.vaccines=pet.vaccines.filter(v=>v.id!==id);
    else pet.dewormings=pet.dewormings.filter(d=>d.id!==id);
    save(); toast('Registro eliminado'); render(); return;
  }
  // exportaciones
  if(t.closest('#expIcs')){ exportICS(); return; }
  if(t.closest('#expPdf')){ exportPDF(); return; }
  if(t.closest('#expJson')){ exportJSON(); return; }
  if(t.closest('#impJson')){ importJSON(); return; }
});
// remDays
document.addEventListener('change', e=>{
  if(e.target.id==='remDays'){ data.remDays=Number(e.target.value); save(); toast('Preferencia guardada'); }
});

/* ======================================================================
   PWA: service worker
   ====================================================================== */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
}

/* ---------------------------- Arranque ---------------------------- */
if(!data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
render();
</script>
