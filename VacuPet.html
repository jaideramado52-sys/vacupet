<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16A34A">
<meta name="description" content="Carné de salud digital para tu mascota: vacunas, desparasitación, peso y recordatorios.">
<title>VacuPet — Carné de salud para mascotas</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<script src="./supabase-config.js" defer></script>
<style>
/* ============================ Sistema de diseño ============================ */
:root{
  --bg:#F4F8F4; --surface:#FFFFFF; --surface-2:#FAFCFA; --ink:#10291A; --muted:#5B6B60;
  --accent:#16A34A; --accent-ink:#0B6B33; --line:#E3ECE5; --line-2:#EEF3EF;
  --green:#16A34A; --amber:#D97706; --red:#DC2626; --blue:#2563EB;
  --radius:16px; --radius-sm:11px; --shadow:0 1px 2px rgba(16,41,26,.05),0 1px 3px rgba(16,41,26,.04);
  --shadow-lg:0 10px 30px rgba(16,41,26,.14);
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,system-ui,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0B130E; --surface:#121C15; --surface-2:#16221A; --ink:#EAF2EC; --muted:#9FB3A6;
    --accent:#22C55E; --accent-ink:#86EFAC; --line:#1E2A22; --line-2:#1A251E;
    --shadow:0 1px 2px rgba(0,0,0,.3); --shadow-lg:0 12px 34px rgba(0,0,0,.5);
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;
  -webkit-font-smoothing:antialiased;min-height:100dvh;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent-ink)}
.hide{display:none !important}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}

/* ---- Header ---- */
header.app{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;
  padding:14px 16px;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line-2);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em;font-size:18px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff}
.brand .logo svg{width:19px;height:19px}
.header-spacer{flex:1}
.langsw{display:flex;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px;box-shadow:var(--shadow)}
.langsw button{border:0;background:none;color:var(--muted);font-size:11.5px;font-weight:700;padding:4px 7px;border-radius:7px}
.langsw button.on{background:var(--accent);color:#fff}
.iconbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--surface);
  display:grid;place-items:center;color:var(--ink);box-shadow:var(--shadow)}
.iconbtn svg{width:18px;height:18px}

/* ---- Layout ---- */
main{max-width:620px;margin:0 auto;padding:16px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
section.block{margin:22px 0 0}
.block-title{font-size:13px;font-weight:650;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 2px 10px;display:flex;align-items:center;justify-content:space-between}

/* ---- Cards ---- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.tile{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);width:100%;text-align:left;color:inherit}
.tile:active{transform:scale(.99)}
.tile .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
.tile .ic svg{width:19px;height:19px}
.tile .tt{flex:1;min-width:0}
.tile .tt b{display:block;font-size:15px}
.tile .tt span{font-size:13px;color:var(--muted)}
.tile .chev{color:var(--muted);flex:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* ---- Color por categoría ---- */
.c-green{background:color-mix(in srgb,var(--green) 13%,var(--surface));color:var(--green)}
.c-amber{background:color-mix(in srgb,var(--amber) 14%,var(--surface));color:var(--amber)}
.c-red{background:color-mix(in srgb,var(--red) 13%,var(--surface));color:var(--red)}
.c-blue{background:color-mix(in srgb,var(--blue) 13%,var(--surface));color:var(--blue)}
.c-accent{background:color-mix(in srgb,var(--accent) 14%,var(--surface));color:var(--accent)}
.c-violet{background:color-mix(in srgb,#7C3AED 13%,var(--surface));color:#7C3AED}

/* ---- Hero ---- */
.hero{padding:18px;display:flex;gap:16px;align-items:center}
.hero h2{font-size:19px}
.hero .sub{color:var(--muted);font-size:14px;margin-top:2px}
.statepill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:650;padding:3px 10px;border-radius:999px;margin-top:8px}
.statepill .dot{width:7px;height:7px;border-radius:50%}

/* ---- Chips ---- */
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:14px}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center;box-shadow:var(--shadow)}
.chip .n{font-size:20px;font-weight:720;letter-spacing:-.02em}
.chip .l{font-size:11px;color:var(--muted);margin-top:1px}

/* ---- Banner ---- */
.banner{display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:var(--radius);margin-top:14px;border:1px solid var(--line)}
.banner .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none}
.banner .ic svg{width:20px;height:20px}
.banner .bb{flex:1;min-width:0}
.banner .bb b{display:block;font-size:14.5px}
.banner .bb span{font-size:12.5px;color:var(--muted)}

/* ---- Carrusel ---- */
.pets-row{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 6px;scrollbar-width:none}
.pets-row::-webkit-scrollbar{display:none}
.petav{flex:none;width:74px;text-align:center;background:none;border:0;padding:0;color:inherit}
.petav .av{width:62px;height:62px;border-radius:50%;margin:0 auto;position:relative;display:grid;place-items:center;
  background:var(--surface-2);border:1px solid var(--line);overflow:hidden;font-size:26px}
.petav .av img{width:100%;height:100%;object-fit:cover}
.petav.active .av{outline:2.5px solid var(--accent);outline-offset:2px}
.petav .nm{font-size:12px;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.petav .ringmini{position:absolute;inset:-4px}
.addpet .av{border-style:dashed;color:var(--muted)}

/* ---- Registros ---- */
.rec{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid var(--line-2)}
.rec:last-child{border-bottom:0}
.rec .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}
.rec .ic svg{width:18px;height:18px}
.rec .rr{flex:1;min-width:0}
.rec .rr b{font-size:14.5px;display:block}
.rec .rr span{font-size:12.5px;color:var(--muted)}
.rec .meta{text-align:right;font-size:12px;flex:none}
.tagdue{display:inline-block;font-size:11px;font-weight:650;padding:2px 8px;border-radius:999px}
.rec .iconmini{color:var(--muted);background:none;border:0;padding:6px;border-radius:8px}
.rec .iconmini svg{width:16px;height:16px;display:block}
.empty{text-align:center;color:var(--muted);padding:34px 20px}
.empty svg{width:40px;height:40px;opacity:.4;margin-bottom:10px}

/* ---- Botones ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:46px;padding:0 18px;border-radius:13px;
  border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:15px;box-shadow:var(--shadow)}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--accent);border-color:transparent;color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 40%,transparent)}
.btn-block{width:100%}
.btn-ghost{background:transparent;border-color:transparent;box-shadow:none;color:var(--accent-ink)}
.btn-danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 30%,var(--line))}
.row-actions{display:flex;gap:10px;margin-top:14px}

/* ---- Formularios ---- */
.field{margin-top:13px}
.field label{display:block;font-size:13px;font-weight:600;margin:0 0 6px 2px;color:var(--ink)}
.field .hint{font-size:12px;color:var(--muted);margin-top:5px}
input,select,textarea{
  width:100%;height:46px;padding:0 13px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface-2);color:var(--ink);font-size:15px;font-family:inherit;outline:none
}
textarea{height:auto;padding:11px 13px;min-height:64px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
.field.err input,.field.err select{border-color:var(--red)}
.field .errmsg{color:var(--red);font-size:12px;margin-top:5px;display:none}
.field.err .errmsg{display:block}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.seg{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px}
.seg button{flex:1;height:38px;border:0;border-radius:9px;background:transparent;color:var(--muted);font-weight:600;font-size:14px}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* ---- Gráfico de peso ---- */
.chartwrap{padding:14px 8px 6px}
.chartwrap svg{width:100%;height:auto;display:block;overflow:visible}
.chart-line{fill:none;stroke:var(--accent);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.chart-dot{fill:var(--surface);stroke:var(--accent);stroke-width:2}
.chart-area{fill:color-mix(in srgb,var(--accent) 12%,transparent)}
.chart-lbl{fill:var(--muted);font-size:10px}

/* ---- Tabbar ---- */
nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:saturate(160%) blur(14px);border-top:1px solid var(--line-2)}
nav.tabbar button{flex:1;max-width:120px;border:0;background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;font-size:11px;font-weight:600}
nav.tabbar button svg{width:23px;height:23px}
nav.tabbar button.on{color:var(--accent)}

/* ---- Modal ---- */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(8,18,12,.5);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);width:100%;max-width:620px;max-height:92dvh;overflow-y:auto;
  border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);animation:up .28s cubic-bezier(.2,.8,.2,1)}
@media(min-width:640px){.scrim{align-items:center}.modal{border-radius:22px}}
@keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.modal-head{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line-2);z-index:1}
.modal-head h3{flex:1;font-size:17px}
.modal-head .x{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);display:grid;place-items:center;color:var(--muted)}
.modal-body{padding:16px 18px 22px}
.modal-foot{position:sticky;bottom:0;background:var(--surface);padding:12px 18px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line-2);display:flex;gap:10px}
.infosheet p{margin:0 0 4px}
.infosheet .ib{padding:13px 0;border-bottom:1px solid var(--line-2)}
.infosheet .ib:last-child{border-bottom:0}
.infosheet .ib b{font-size:13px;color:var(--muted);font-weight:650;text-transform:uppercase;letter-spacing:.03em}
.catbadge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.qrbox{display:grid;place-items:center;padding:16px;background:#fff;border-radius:14px;margin-top:14px}
.qrbox img,.qrbox table{width:200px;height:200px}
.linkbox{display:flex;gap:8px;margin-top:12px}
.linkbox input{font-size:12px;color:var(--muted)}

/* ---- Toast ---- */
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Foto ---- */
.photo-pick{display:flex;align-items:center;gap:14px}
.photo-pick .pv{width:64px;height:64px;border-radius:16px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;display:grid;place-items:center;font-size:28px;flex:none}
.photo-pick .pv img{width:100%;height:100%;object-fit:cover}

/* ---- Compartido (solo lectura) ---- */
.sharebar{background:var(--accent);color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:600;display:flex;gap:10px;align-items:center;justify-content:center}
.sharebar button{background:rgba(255,255,255,.2);color:#fff;border:0;border-radius:9px;padding:6px 12px;font-weight:600;font-size:13px}

.disclaimer{font-size:12px;color:var(--muted);text-align:center;padding:24px 16px 8px;line-height:1.6}

/* ---- Impresión (PDF) ---- */
#printArea{display:none}
@media print{
  body{padding:0;background:#fff;color:#000}
  header.app,nav.tabbar,main,.toast,.scrim,.sharebar{display:none !important}
  #printArea{display:block;padding:24px;font-family:var(--font);color:#000}
  #printArea h1{font-size:22px;margin-bottom:2px}
  #printArea table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12px}
  #printArea th,#printArea td{border:1px solid #ccc;padding:6px 8px;text-align:left}
  #printArea th{background:#f2f2f2}
  #printArea h3{margin:18px 0 4px;font-size:14px}
}
</style>
</head>
<body>

<header class="app">
  <div class="brand"><span class="logo" id="brandLogo"></span> VacuPet</div>
  <div class="header-spacer"></div>
  <div class="langsw" id="langsw" role="group" aria-label="Idioma"></div>
  <button class="iconbtn" id="btnBackup" aria-label="Más opciones"></button>
</header>

<main id="app"></main>
<nav class="tabbar" id="tabbar" role="tablist"></nav>

<div id="modalRoot"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div id="printArea"></div>

<input type="file" id="photoInput" accept="image/*" class="hide">
<input type="file" id="importInput" accept="application/json,.json" class="hide">

/* ---------------------------- Estado / persistencia ---------------------------- */
const KEY = 'vacupet:data:v1';
let data = load();
let shared = null; // si !=null, estamos en vista de carné compartido (solo lectura)

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ return migrate(JSON.parse(raw)); }
  }catch(e){ console.warn('No se pudo leer el estado:', e); }
  return defaults();
}
function defaults(){ return { v:1, activeId:null, remDays:30, lang:'es', pets:[] }; }
function migrate(d){
  if(!d || typeof d!=='object') return defaults();
  if(!d.v) d.v = 1;
  if(!Array.isArray(d.pets)) d.pets = [];
  if(typeof d.remDays !== 'number') d.remDays = 30;
  if(!d.lang) d.lang = 'es';
  d.pets.forEach(p=>{
    p.info = p.info || {};
    p.vaccines = p.vaccines || [];
    p.dewormings = p.dewormings || [];
    p.weights = p.weights || [];
    p.vetVisits = p.vetVisits || [];
  });
  return d;
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(data)); }
  catch(e){ toast('No se pudo guardar (almacenamiento lleno).'); console.error(e); }
}
function activePet(){ return data.pets.find(p=>p.info.id===data.activeId) || data.pets[0] || null; }

/* ---------------------------- Utilidades ---------------------------- */
let _seq = 0;
function uid(){ _seq++; return 'p'+Date.now().toString(36)+_seq.toString(36); }
function todayISO(){ const d=new Date(); d.setHours(0,0,0,0); return toISO(d); }
function toISO(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${da}`; }
function parseISO(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return dt; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
function monthsBetween(a,b){ return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()); }
function localeOf(){ return {es:'es',en:'en',pt:'pt-BR'}[data.lang||'es']; }
function fmt(s){ const d=parseISO(s); if(!d) return '—'; return d.toLocaleDateString(localeOf(),{day:'2-digit',month:'short',year:'numeric'}); }
function ageText(nac){
  if(!nac) return '';
  const m = monthsBetween(parseISO(nac), new Date()); if(m<0) return '';
  const U={es:['mes','meses','año','años'],en:['month','months','year','years'],pt:['mês','meses','ano','anos']}[data.lang||'es'];
  if(m<12) return `${m} ${m===1?U[0]:U[1]}`;
  const y=Math.floor(m/12), r=m%12;
  return `${y} ${y===1?U[2]:U[3]}${r?` ${r}m`:''}`;
}
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):''; }

/* ---------------------------- Esquema: sugerir próxima ---------------------------- */
function suggestProxima(especie, nombre, fechaISO, nacimientoISO){
  const rule = schemeRule(especie, nombre);
  if(!rule || !fechaISO) return '';
  const base = parseISO(fechaISO);
  const ageMonths = nacimientoISO ? monthsBetween(parseISO(nacimientoISO), base) : null;
  if(rule.tipo==='serie' && ageMonths!=null && ageMonths < 4) return toISO(addDays(base, rule.intervaloDias));
  if(rule.refuerzoMeses) return toISO(addMonths(base, rule.refuerzoMeses));
  return '';
}
function suggestDeworm(tipo, fechaISO){
  if(!fechaISO) return '';
  return toISO(tipo==='externa' ? addMonths(parseISO(fechaISO),1) : addMonths(parseISO(fechaISO),3));
}

/* ---------------------------- Recordatorios ---------------------------- */
function reminders(pet){
  const out=[];
  (pet.vaccines||[]).forEach(v=>{ if(v.proxima) out.push({kind:'vacuna',nombre:v.nombre,fecha:v.proxima}); });
  (pet.dewormings||[]).forEach(d=>{ if(d.proxima) out.push({kind:'desparasitación',nombre:d.producto||(d.tipo==='externa'?t('tile_dew'):t('tile_dew')),fecha:d.proxima}); });
  out.sort((a,b)=>a.fecha<b.fecha?-1:1);
  return out;
}
function statusOf(fecha){
  const today=todayISO();
  if(fecha<today) return 'vencida';
  if(daysBetween(today,fecha)<=data.remDays) return 'proxima';
  return 'futura';
}
function petSummary(pet){
  const rem = reminders(pet);
  const aplicadas = (pet.vaccines||[]).length + (pet.dewormings||[]).length;
  let vencidas=0, proximas=0, next=null;
  rem.forEach(r=>{ const s=statusOf(r.fecha); if(s==='vencida') vencidas++; else if(s==='proxima') proximas++; if(r.fecha>=todayISO()&&!next) next=r; });
  let estado='aldia'; if(vencidas>0) estado='vencidas'; else if(proximas>0) estado='proximas';
  const pending = vencidas+proximas;
  const pct = (aplicadas+pending)===0 ? 0 : Math.round(aplicadas/(aplicadas+pending)*100);
  return {aplicadas,vencidas,proximas,next,estado,pct,rem};
}

/* ---------------------------- Anillo de progreso ---------------------------- */
function ringSVG(pct, color, size=58, sw=6){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 ${size/2} ${size/2})"/></svg>`;
}
function stateMeta(){ return {
  aldia:{label:t('st_aldia'),color:'var(--green)'},
  proximas:{label:t('st_proximas'),color:'var(--amber)'},
  vencidas:{label:t('st_vencidas'),color:'var(--red)'},
};}

/* ---------------------------- Gráfico de peso ---------------------------- */
function weightChart(weights){
  const pts = weights.slice().filter(w=>w.fecha&&w.kg).sort((a,b)=>a.fecha<b.fecha?-1:1)
    .map(w=>({x:parseISO(w.fecha).getTime(), y:Number(w.kg)}));
  if(pts.length===0) return '';
  const W=560, H=160, pad=26;
  if(pts.length===1){
    return `<div class="chartwrap"><svg viewBox="0 0 ${W} ${H}"><circle class="chart-dot" cx="${W/2}" cy="${H/2}" r="5"/><text class="chart-lbl" x="${W/2}" y="${H/2-12}" text-anchor="middle">${pts[0].y} kg</text></svg></div>`;
  }
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const sx=x=> pad + (maxX===minX?0:(x-minX)/(maxX-minX))*(W-2*pad);
  const sy=y=> (H-pad) - (maxY===minY?0.5:(y-minY)/(maxY-minY))*(H-2*pad);
  const line = pts.map((p,i)=>`${i?'L':'M'}${sx(p.x).toFixed(1)} ${sy(p.y).toFixed(1)}`).join(' ');
  const area = `M${sx(pts[0].x).toFixed(1)} ${(H-pad)} ` + pts.map(p=>`L${sx(p.x).toFixed(1)} ${sy(p.y).toFixed(1)}`).join(' ') + ` L${sx(pts[pts.length-1].x).toFixed(1)} ${(H-pad)} Z`;
  const dots = pts.map(p=>`<circle class="chart-dot" cx="${sx(p.x).toFixed(1)}" cy="${sy(p.y).toFixed(1)}" r="3.4"/>`).join('');
  return `<div class="chartwrap"><svg viewBox="0 0 ${W} ${H}">
    <path class="chart-area" d="${area}"/><path class="chart-line" d="${line}"/>${dots}
    <text class="chart-lbl" x="${pad}" y="14">${maxY} kg</text>
    <text class="chart-lbl" x="${pad}" y="${H-8}">${minY} kg</text></svg></div>`;
}

/* ---- Carné (historial: vacunas, desparasitación, visitas) ---- */
function vacRow(v, ro){
  const dueTag = v.proxima ? (()=>{ const st=statusOf(v.proxima); const cls=st==='vencida'?'c-red':st==='proxima'?'c-amber':'c-green';
    const txt=st==='vencida'?t('tag_overdue'):st==='proxima'?tf('due_in',{n:daysBetween(todayISO(),v.proxima)}):t('tag_next');
    return `<span class="tagdue ${cls}">${txt}</span>`; })() : '';
  const sub=[fmt(v.fecha), v.dosis&&`${v.dosis}`, v.lugar].filter(Boolean).join(' · ');
  const ap = activePet();
  const hasInfo = !ro && ap && !!schemeRule(ap.info.especie, v.nombre);
  return `<div class="rec">
    <span class="ic c-accent">${I.syringe}</span>
    <div class="rr"><b>${esc(v.nombre)}</b><span>${esc(sub)}${v.proxima?` · ${t('next').toLowerCase()} ${fmt(v.proxima)}`:''}</span></div>
    <div class="meta">${dueTag}</div>
    ${ro?'':`${hasInfo?`<button class="iconmini" data-info="${esc(v.nombre)}" aria-label="info">${I.info}</button>`:''}<button class="iconmini" data-del="vacuna" data-id="${v.id}" aria-label="${t('delete')}">${I.trash}</button>`}
  </div>`;
}
function dewRow(d, ro){
  const dueTag = d.proxima ? (()=>{ const st=statusOf(d.proxima); const cls=st==='vencida'?'c-red':st==='proxima'?'c-amber':'c-green';
    const txt=st==='vencida'?t('tag_overdue'):st==='proxima'?tf('due_in',{n:daysBetween(todayISO(),d.proxima)}):t('tag_next');
    return `<span class="tagdue ${cls}">${txt}</span>`; })() : '';
  const title=d.producto||(d.tipo==='externa'?'Externa':'Interna');
  const sub=[fmt(d.fecha), d.tipo==='externa'?'externa':'interna', d.peso?d.peso+' kg':''].filter(Boolean).join(' · ');
  return `<div class="rec"><span class="ic c-blue">${I.bug}</span>
    <div class="rr"><b>${esc(title)}</b><span>${esc(sub)}${d.proxima?` · ${t('next').toLowerCase()} ${fmt(d.proxima)}`:''}</span></div>
    <div class="meta">${dueTag}</div>
    ${ro?'':`<button class="iconmini" data-del="desparasitacion" data-id="${d.id}" aria-label="${t('delete')}">${I.trash}</button>`}</div>`;
}
function visitRow(v, ro){
  const sub=[fmt(v.fecha), v.clinica].filter(Boolean).join(' · ');
  return `<div class="rec"><span class="ic c-violet">${I.stetho}</span>
    <div class="rr"><b>${esc(v.motivo||'Visita')}</b><span>${esc(sub)}${v.diagnostico?` · ${esc(v.diagnostico)}`:''}</span></div>
    ${ro?'':`<button class="iconmini" data-del="visita" data-id="${v.id}" aria-label="${t('delete')}">${I.trash}</button>`}</div>`;
}

  document.getElementById('savePet').addEventListener('click', ()=>{
    const nombre=val('m-nombre').trim();
    if(!nombre){ document.getElementById('f-nombre').classList.add('err'); return; }
    const info = { id: existing?existing.id:uid(), nombre, especie:val('m-especie'), raza:val('m-raza').trim(), sexo:val('m-sexo'),
      nacimiento:val('m-nac'), adopcion:val('m-adop'), color:val('m-color').trim(), peso:val('m-peso'), microchip:val('m-chip').trim(),
      esterilizado: esterVal==='si'?true:esterVal==='no'?false:null, veterinario:val('m-vet').trim(), notas:val('m-notas').trim(), foto:photoTmp||null };
    if(existing){ data.pets.find(x=>x.info.id===existing.id).info=info; }
    else { data.pets.push({info, vaccines:[], dewormings:[], weights:[], vetVisits:[]}); data.activeId=info.id; }
    save(); closeModal(); toast(t('saved_pet')); go('home');
  });
}

      <div class="field"><label>Vía</label><select id="v-via"><option value="">—</option><option>Subcutánea</option><option>Intramuscular</option><option>Intranasal</option><option>Oral</option></select></div></div>
    <div class="field"><label>Aplicada por</label><input id="v-por" placeholder="Veterinario/a"></div>
    <div class="field"><label>Notas</label><textarea id="v-notas"></textarea></div>`;
  openModal(modalShell(t('reg_vac'), body, FOOT('saveVac')));
  function refreshSug(){ const nombre=val('v-nombre'), fecha=val('v-fecha'); const sug=suggestProxima(pet.info.especie,nombre,fecha,pet.info.nacimiento);
    const el=document.getElementById('v-sug');
    if(sug){ el.textContent=`${{es:'Sugerencia del esquema',en:'Schedule suggestion',pt:'Sugestão do esquema'}[data.lang||'es']}: ${fmt(sug)}`; if(!val('v-proxima')) document.getElementById('v-proxima').value=sug; }
    else el.textContent=''; }
  document.getElementById('v-nombre').addEventListener('input', refreshSug);

  refreshSug();
  document.getElementById('saveVac').addEventListener('click', ()=>{ let ok=true; const nombre=val('v-nombre').trim(), fecha=val('v-fecha');
    if(!nombre){ document.getElementById('f-vnombre').classList.add('err'); ok=false; } if(!fecha){ document.getElementById('f-vfecha').classList.add('err'); ok=false; } if(!ok) return;
    pet.vaccines.push({ id:uid(), nombre, fecha, dosis:val('v-dosis').trim(), proxima:val('v-proxima'), marca:val('v-marca').trim(),
      lote:val('v-lote').trim(), lugar:val('v-lugar').trim(), via:val('v-via'), aplicada_por:val('v-por').trim(), notas:val('v-notas').trim(), source:'manual' });
    save(); closeModal(); toast(t('saved_vac')); render(); });
}

/* ---- Desparasitación ---- */

    <div class="field"><label>Tipo</label><div class="seg" id="d-tipo">

    <div class="field"><label>Producto</label><input id="d-prod" placeholder="Nombre del antiparasitario"></div>
    <div class="two"><div class="field" id="f-dfecha"><label>Fecha *</label><input type="date" id="d-fecha" value="${todayISO()}" max="${todayISO()}"><div class="errmsg">Fecha requerida</div></div>
      <div class="field"><label>Peso (kg)</label><input type="number" step="0.1" min="0" id="d-peso" value="${esc(pet.info.peso||'')}"></div></div>
    <div class="field"><label>Próxima (orientativa)</label><input type="date" id="d-proxima"><div class="hint" id="d-sug"></div></div>
    <div class="field"><label>Notas</label><textarea id="d-notas"></textarea></div>`;
  openModal(modalShell(t('reg_dew'), body, FOOT('saveDew')));
  function refreshSug(){ const sug=suggestDeworm(tipo,val('d-fecha')); document.getElementById('d-sug').textContent=sug?`${{es:'Sugerencia',en:'Suggestion',pt:'Sugestão'}[data.lang||'es']}: ${fmt(sug)}`:''; if(sug&&!val('d-proxima')) document.getElementById('d-proxima').value=sug; }
  document.getElementById('d-tipo').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b) return; tipo=b.dataset.v; [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b)); document.getElementById('d-proxima').value=''; refreshSug(); });
  document.getElementById('d-fecha').addEventListener('change', ()=>{ document.getElementById('d-proxima').value=''; refreshSug(); });
  refreshSug();
  document.getElementById('saveDew').addEventListener('click', ()=>{ const fecha=val('d-fecha'); if(!fecha){ document.getElementById('f-dfecha').classList.add('err'); return; }

    save(); closeModal(); toast(t('saved_dew')); render(); });

/* ---- Peso ---- */

    <div class="field" id="f-wkg"><label>Peso (kg) *</label><input type="number" step="0.01" min="0" id="w-kg" placeholder="0.0" value="${esc(pet.info.peso||'')}"><div class="errmsg">Peso requerido</div></div></div>`;

/* ---- Compartir ---- */
function shareModal(){
  const pet=activePet();
  const payload = { app:'vacupet', v:1, pet:{ info:{...pet.info, foto:undefined}, vaccines:pet.vaccines, dewormings:pet.dewormings } };
  let link;
  try{ const enc=b64urlEncode(JSON.stringify(payload)); link=location.origin+location.pathname+'#v='+enc; }
  catch(e){ toast('No se pudo generar el enlace'); return; }
  const body=`<p class="hint">${t('m_share_sub')}</p>
    <div class="qrbox" id="qrbox"><span class="hint">QR…</span></div>
    <div class="linkbox"><input id="shareLink" readonly value="${esc(link)}"><button class="btn" id="copyLink" aria-label="${t('copied')}">${I.copy}</button></div>`;
  openModal(modalShell(t('m_share'), body, `<button class="btn btn-block" data-close>${t('close')}</button>`));
  document.getElementById('copyLink').addEventListener('click', async ()=>{ try{ await navigator.clipboard.writeText(link); }catch(_){ const i=document.getElementById('shareLink'); i.select(); document.execCommand&&document.execCommand('copy'); } toast(t('copied')); });
  ensureQR(ok=>{ const box=document.getElementById('qrbox'); if(!box) return;
    if(ok && window.qrcode){ try{ const qr=window.qrcode(0,'M'); qr.addData(link); qr.make(); box.innerHTML=qr.createImgTag(4,0); }catch(e){ box.innerHTML='<span class="hint">QR no disponible offline</span>'; } }
    else box.innerHTML='<span class="hint">QR no disponible offline</span>'; });
}
let qrLoading=false;
function ensureQR(cb){
  if(window.qrcode) return cb(true);
  if(qrLoading){ return cb(false); }
  qrLoading=true;
  const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js';
  s.onload=()=>cb(true); s.onerror=()=>cb(false); document.head.appendChild(s);
}

/* ======================================================================
   Foto: compresión
   ====================================================================== */
function compressImage(file, cb){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image();
    img.onload=()=>{ const max=512, scale=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.78)); };
    img.onerror=()=>toast('No se pudo leer la imagen'); img.src=e.target.result; };
  reader.readAsDataURL(file);
}

/* ======================================================================
   Compartir: codificación base64url + lectura del hash
   ====================================================================== */
function b64urlEncode(str){ return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDecode(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4) s+='='; return decodeURIComponent(escape(atob(s))); }
function readShareHash(){
  const h=location.hash||'';
  if(h.startsWith('#v=')){ try{ const obj=JSON.parse(b64urlDecode(h.slice(3))); if(obj&&obj.app==='vacupet'&&obj.pet){ return obj.pet; } }catch(e){ console.warn(e); } }
  return null;
}

/* ======================================================================
   Exportaciones
   ====================================================================== */
function exportICS(){
  const pet=activePet(); const rems=reminders(pet).filter(r=>r.fecha>=todayISO());
  if(!rems.length){ toast('No hay próximas fechas que exportar'); return; }
  const pad=n=>String(n).padStart(2,'0'); const fmtICS=s=>{ const d=parseISO(s); return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`; };
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//VacuPet//ES\r\nCALSCALE:GREGORIAN\r\n';
  rems.forEach((r,i)=>{ ics+=`BEGIN:VEVENT\r\nUID:vacupet-${pet.info.id}-${i}@local\r\nDTSTART;VALUE=DATE:${fmtICS(r.fecha)}\r\nSUMMARY:${pet.info.nombre}: ${r.kind} — ${r.nombre}\r\nDESCRIPTION:VacuPet (orientativo)\r\nEND:VEVENT\r\n`; });
  ics+='END:VCALENDAR\r\n'; download(`vacupet-${slug(pet.info.nombre)}.ics`, ics, 'text/calendar'); toast(t('m_ics'));
}
function exportPDF(){
  const pet=activePet(); const info=pet.info;
  const vac=(pet.vaccines||[]).slice().sort((a,b)=>(a.fecha||'')<(b.fecha||'')?-1:1);
  const dew=(pet.dewormings||[]).slice().sort((a,b)=>(a.fecha||'')<(b.fecha||'')?-1:1);
  const rowV=v=>`<tr><td>${esc(v.nombre)}</td><td>${fmt(v.fecha)}</td><td>${esc(v.dosis||'')}</td><td>${esc(v.lote||'')}</td><td>${esc(v.marca||'')}</td><td>${v.proxima?fmt(v.proxima):''}</td></tr>`;
  const rowD=d=>`<tr><td>${esc(d.producto||(d.tipo==='externa'?'Externa':'Interna'))}</td><td>${d.tipo==='externa'?'Externa':'Interna'}</td><td>${fmt(d.fecha)}</td><td>${d.peso?d.peso+' kg':''}</td><td>${d.proxima?fmt(d.proxima):''}</td></tr>`;
  document.getElementById('printArea').innerHTML=`<h1>🐾 ${t('card_of')} ${esc(info.nombre)}</h1>
    <div>${esc(cap(info.especie))}${info.raza?` · ${esc(info.raza)}`:''}${info.nacimiento?` · ${fmt(info.nacimiento)} (${ageText(info.nacimiento)})`:''}</div>
    <div>${info.microchip?`Microchip: ${esc(info.microchip)} · `:''}${info.esterilizado===true?'Esterilizado/a · ':''}${info.veterinario?`Vet: ${esc(info.veterinario)}`:''}</div>
    <h3>${t('sec_vaccines')}</h3>${vac.length?`<table><thead><tr><th>Vacuna</th><th>Fecha</th><th>Dosis</th><th>Lote</th><th>Marca</th><th>Próxima</th></tr></thead><tbody>${vac.map(rowV).join('')}</tbody></table>`:'<div>—</div>'}
    <h3>${t('sec_deworm')}</h3>${dew.length?`<table><thead><tr><th>Producto</th><th>Tipo</th><th>Fecha</th><th>Peso</th><th>Próxima</th></tr></thead><tbody>${dew.map(rowD).join('')}</tbody></table>`:'<div>—</div>'}
    <p style="margin-top:18px;font-size:11px;color:#666">VacuPet · ${fmt(todayISO())}. ${t('disc')}</p>`;
  setTimeout(()=>window.print(),60);
}
function exportJSON(){ download(`vacupet-respaldo-${todayISO()}.json`, JSON.stringify(data,null,2), 'application/json'); toast(t('m_json')); }
function importJSON(){
  const inp=document.getElementById('importInput'); inp.value='';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d||!Array.isArray(d.pets)) throw new Error('bad');
      if(!confirm('Esto reemplazará tus datos actuales por los del respaldo. ¿Continuar?')) return;
      data=migrate(d); if(!data.activeId&&data.pets[0]) data.activeId=data.pets[0].info.id; save(); toast(t('m_import')); go('home');
    }catch(err){ toast('Archivo inválido'); console.error(err); } }; r.readAsText(f); };
  inp.click();
}
function download(name, content, type){ const b=new Blob([content],{type}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function slug(s){ return String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'mascota'; }

/* ======================================================================
   Helpers UI + toast
   ====================================================================== */
function val(id){ const el=document.getElementById(id); return el?el.value:''; }
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200); }

/* ======================================================================
   Eventos (delegación)
   ====================================================================== */
document.addEventListener('click', e=>{
  const t0=e.target;
  if(t0.closest('[data-close]')){ closeModal(); return; }
  // idioma
  const lg=t0.closest('[data-lang]'); if(lg){ data.lang=lg.dataset.lang; save(); render(); return; }
  // compartido: abrir mi app
  if(t0.closest('#openMine')){ shared=null; history.replaceState(null,'',location.pathname); go('home'); return; }
  if(shared) return; // en vista compartida no hay más acciones
  const tab=t0.closest('[data-tab]'); if(tab){ go(tab.dataset.tab); return; }
  const goEl=t0.closest('[data-go]'); if(goEl){ go(goEl.dataset.go); return; }
  if(t0.closest('#btnBackup')){ go('more'); return; }
  if(t0.closest('#onbAdd')||t0.closest('#addPet')){ petModal(null); return; }
  const pa=t0.closest('[data-pet]'); if(pa){ data.activeId=pa.dataset.pet; save(); render(); return; }
  const sw=t0.closest('[data-switch]'); if(sw){ data.activeId=sw.dataset.switch; save(); closeModal(); go('home'); return; }
  if(t0.closest('#switchPet')){ switchModal(); return; }
  const add=t0.closest('[data-add]'); if(add){ const k=add.dataset.add; k==='vacuna'?vaccineModal():k==='desparasitacion'?dewormModal():visitModal(); return; }
  if(t0.closest('#addWeight')){ weightModal(); return; }
  const inf=t0.closest('[data-info]'); if(inf){ infoModal(inf.dataset.info); return; }
  if(t0.closest('#editPet')){ petModal(activePet().info); return; }
  if(t0.closest('#delPet')){ if(confirm(`¿Eliminar a ${activePet().info.nombre} y todo su carné?`)){ data.pets=data.pets.filter(p=>p.info.id!==data.activeId); data.activeId=data.pets[0]?data.pets[0].info.id:null; save(); toast(t('deleted')); go('home'); } return; }
  const del=t0.closest('[data-del]'); if(del){ const pet=activePet(), id=del.dataset.id, k=del.dataset.del;
    if(k==='vacuna') pet.vaccines=pet.vaccines.filter(x=>x.id!==id);
    else if(k==='desparasitacion') pet.dewormings=pet.dewormings.filter(x=>x.id!==id);
    else if(k==='peso'){ pet.weights=pet.weights.filter(x=>x.id!==id); const l=pet.weights.slice().sort((a,b)=>a.fecha<b.fecha?1:-1)[0]; pet.info.peso=l?l.kg:pet.info.peso; }
    else if(k==='visita') pet.vetVisits=pet.vetVisits.filter(x=>x.id!==id);
    save(); toast(t('deleted')); render(); return; }
  if(t0.closest('#shareCard')){ shareModal(); return; }
  if(t0.closest('#expIcs')){ exportICS(); return; }
  if(t0.closest('#expPdf')){ exportPDF(); return; }
  if(t0.closest('#expJson')){ exportJSON(); return; }
  if(t0.closest('#impJson')){ importJSON(); return; }
});
document.addEventListener('change', e=>{ if(e.target.id==='remDays'){ data.remDays=Number(e.target.value); save(); toast(t('pref_saved')); } });

/* ======================================================================
   PWA
   ====================================================================== */
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{})); }

/* ---------------------------- Arranque ---------------------------- */
shared = readShareHash();
if(!shared && !data.activeId && data.pets[0]) data.activeId = data.pets[0].info.id;
render();
</script>
